                const eb = enemyBullets[i];
                if (eb.isDead) { enemyBullets.splice(i, 1); continue; }
                eb.x += eb.vx;
                eb.y += eb.vy;
                if (eb.x < -20 || eb.x > W + 20 || eb.y < -20 || eb.y > H + 20) {
                    eb.isDead = true;
                    continue;
                }
                if (eb.isShadowBall) {
                    eb.timer++;
                    if (eb.timer > eb.duration) {
                        eb.isDead = true;
                        continue;
                    }
                    if (dist(eb, { x: game.towerX, y: game.towerY }) < eb.radius + 16) {
                        const dmg = eb.damage || 3;
                        game.lives -= dmg;
                        spawnFloatingText(game.towerX, game.towerY - 30, `💔 -${dmg} (暗影球)`, '#8e44ad', 24);
                        eb.isDead = true;
                        spawnParticles(eb.x, eb.y, '#8e44ad', 15);
                        updateUI();
                        if (game.lives <= 0) { gameOver(); return; }
                        continue;
                    }
                } else {
                    if (dist(eb, { x: game.towerX, y: game.towerY }) < eb.radius + 16) {
                        const dmg = eb.damage || 1;
                        game.lives -= dmg;
                        spawnFloatingText(game.towerX, game.towerY - 30, `💔 -${dmg} (弹幕)`, '#ff6b6b', 24);
                        eb.isDead = true;
                        spawnParticles(eb.x, eb.y, '#ff6b6b', 8);
                        updateUI();
                        if (game.lives <= 0) { gameOver(); return; }
                    }
                }
            }
        }

        // ---------- 子弹创建 ----------
        function createBullet(x, y, angle, type, chargeLevel = 0, empowered = false) {
            const isPhysical = (type === 'physical');
            let dmg = getAttack();
            if (isPhysical) dmg = Math.floor(dmg * 1.5);
            if (empowered) {
                dmg = Math.floor(dmg * getSkillDamageMultiplier());
            }
            const bonus = 1 + chargeLevel * 1.0;
            const finalDmg = Math.floor(dmg * bonus);
            const speed = game.bulletSpeed * (1 + chargeLevel * 0.2);
            const radius = 8 + game.attackLevel * 0.6 + chargeLevel * 2;
            const colorMap = { fire: '#e67e22', ice: '#3498db', thunder: '#f1c40f', water: '#1abc9c', wind: '#9b59b6',
                physical: '#95a5a6' };
            const glowMap = { fire: 'rgba(230,126,34,0.3)', ice: 'rgba(52,152,219,0.3)', thunder: 'rgba(241,196,15,0.3)',
                water: 'rgba(26,188,156,0.3)', wind: 'rgba(155,89,182,0.3)', physical: 'rgba(127,140,141,0.2)' };
            return {
                x,
                y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                radius,
                damage: finalDmg,
                bounceCount: 0,
                maxBounce: game.bounceLevel,
                canBounce: game.bounceLevel > 0,
                hitMonsters: new Set(),
                isDead: false,
                color: colorMap[type] || '#74b9ff',
                glow: glowMap[type] || 'rgba(116,185,255,0.2)',
                type,
                chargeLevel,
                isPhysical,
                elementType: isPhysical ? null : type,
                isEmpowered: empowered,
            };
        }

        // ---------- 射击 ----------
        function fireBullet(chargeLevel) {
            if (game.isOver) return;
            if (game.cooldownTimer > 0) return;
            const angle = angleTo({ x: game.towerX, y: game.towerY }, { x: game.mouseX, y: game.mouseY });
            const type = getNextBulletType();
            let empowered = false;
            if (game.empoweredShot) {
                empowered = true;
                game.empoweredShot = false;
            }
            const b = createBullet(game.towerX, game.towerY, angle, type, chargeLevel, empowered);
            bullets.push(b);
            for (let i = 0; i < 6; i++) {
                const a = angle + rand(-0.3, 0.3);
                const s = rand(0.8, 2.5) * (1 + chargeLevel * 0.5);
                particles.push({ x: game.towerX + Math.cos(angle) * 30, y: game.towerY + Math.sin(angle) * 30, vx: Math.cos(a) *
                        s, vy: Math.sin(a) * s, life: rand(5, 12), maxLife: 12, radius: rand(2, 4), color: b.color,
                    decay: 0.92 });
            }
            game.isCharging = false;
            game.chargeTime = 0;
            game.chargeLevel = 0;
            game.cooldownTimer = game.cooldownMax;
        }

        // ---------- 自动射击 ----------
        function autoFire() {
            if (!game.autoShoot) return;
            if (game.isOver || game.paused || game.upgradeOpen || game.bestiaryOpen || game.settingsOpen) return;
            if (game.cooldownTimer > 0) return;
            let nearest = null;
            let nearestDist = Infinity;
            for (const m of monsters) {
                if (m.isDead) continue;
                const d = dist({ x: game.towerX, y: game.towerY }, m);
                if (d < nearestDist) {
                    nearestDist = d;
                    nearest = m;
                }
            }
            if (nearest) {
                game.mouseX = nearest.x;
                game.mouseY = nearest.y;
                fireBullet(0);
            }
        }

        // ---------- 波次完成检测 ----------
        function checkWaveComplete() {
            if (game.isOver) return;
            if (!game.waveActive) return;
            if (monsters.length === 0 && game.monstersSpawned >= game.monstersInWave) {
                game.waveActive = false;
                window.updateMaxWave(game.wave);
                game.wave++;
                game.waveCooldown = 180;
                spawnFloatingText(W / 2, 50, `🌊 第 ${game.wave - 1} 波完成！`, '#a29bfe', 22);
                hideBossHealthBar();
                game.lykourgosEmpowerActive = false;
                updateUI();
            }
        }

        // ---------- 更新 ----------
        function update() {
            if (game.isOver || game.paused || game.upgradeOpen || game.bestiaryOpen || game.settingsOpen) return;
            game.damage = getAttack();
            game.cooldownMax = getCooldownMax();
            game.maxChargeTime = getMaxChargeTime();
            game.towerSpeed = getTowerSpeed();
            game.goldBonus = getGoldBonus();
            game.maxLives = getMaxLives();
            if (game.lives > game.maxLives) game.lives = game.maxLives;

            updateLykourgosEmpower();

            if (game.cooldownTimer > 0) game.cooldownTimer--;
            if (game.isCharging && game.cooldownTimer === 0) {
                game.chargeTime++;
                if (game.chargeTime >= game.maxChargeTime) game.chargeTime = game.maxChargeTime;
                game.chargeLevel = game.chargeTime / game.maxChargeTime;
                if (game.chargeTime % 4 === 0) {
                    const count = 1 + Math.floor(game.chargeLevel * 1.5);
                    for (let i = 0; i < count; i++) {
                        const angle = rand(0, Math.PI * 2);
                        const r = 15 + game.chargeLevel * 25;
                        particles.push({
                            x: game.towerX + Math.cos(angle) * r,
                            y: game.towerY + Math.sin(angle) * r,
                            vx: Math.cos(angle + game.chargeTime * 0.04) * (0.2 + game.chargeLevel * 0.3),
                            vy: Math.sin(angle + game.chargeTime * 0.04) * (0.2 + game.chargeLevel * 0.3),
                            life: 10 + game.chargeLevel * 8,
                            maxLife: 20,
                            radius: 1.5 + game.chargeLevel * 1.5,
                            color: `hsla(190, 80%, ${70 + game.chargeLevel * 20}%, 0.5)`,
                            decay: 0.97,
                        });
                    }
                    if (Math.random() < 0.08 + game.chargeLevel * 0.06) {
                        spawnMapleLeaf(game.towerX + rand(-15, 15), game.towerY - 15, '#e67e22');
                    }
                }
            }

            if (game.autoShoot) {
                autoFire();
            }

            let dx = 0,
                dy = 0;
            if (game.keys['w'] || game.keys['W']) dy = -1;
            if (game.keys['s'] || game.keys['S']) dy = 1;
            if (game.keys['a'] || game.keys['A']) dx = -1;
            if (game.keys['d'] || game.keys['D']) dx = 1;
            if (game.joystick.active) {
                dx += game.joystick.dx;
                dy += game.joystick.dy;
            }
            const len = Math.hypot(dx, dy);
            if (len > 1) { dx /= len;
                dy /= len; }
            const sens = game.sensitivity;
            let speed = game.towerSpeed * sens;
            game.towerX += dx * speed;
            game.towerY += dy * speed;
            game.towerX = clamp(game.towerX, 30, W - 30);
            game.towerY = clamp(game.towerY, 30, H - 30);

            const interval = getRegenInterval();
            game.regenTimer += 1/60;
            if (game.regenTimer >= interval) {
                game.regenTimer = 0;
                if (game.lives < game.maxLives) {
                    game.lives++;
                    spawnFloatingText(game.towerX, game.towerY - 60, '+1 ❤️', '#2ed573', 18);
                }
                updateUI();
            }

            if (!game.waveActive && game.waveCooldown > 0) {
                game.waveCooldown--;
                if (game.waveCooldown === 0 && !game.isOver) startWave();
            }

            updateDrops();
            updateEye();
            updateMonsters();
            updateBullets();
            updateParticles();
            updateLaserEffects();
            if (currentBoss && !currentBoss.isDead) {
                updateBossHealthBar();
            } else if (currentBoss) {
                hideBossHealthBar();
            }
            checkWaveComplete();
            updateUI();
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                if (!p || !isFinite(p.x) || !isFinite(p.y)) { particles.splice(i, 1); continue; }
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= p.decay || 0.96;
                p.vy *= p.decay || 0.96;
                p.vy += 0.04;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                const ft = floatingTexts[i];
                if (!ft || !isFinite(ft.x) || !isFinite(ft.y)) { floatingTexts.splice(i, 1); continue; }
                ft.y += ft.vy;
                ft.life--;
                ft.alpha = ft.life / 50;
                if (ft.life <= 0) floatingTexts.splice(i, 1);
            }
            if (toast) {
                toast.timer++;
                toast.alpha = 1 - (toast.timer / toast.maxTimer);
                if (toast.timer >= toast.maxTimer) toast = null;
            }
        }

        // ---------- 渲染 ----------
        function drawMonster(m) {
            if (!m || m.isDead) return;
            if (!isFinite(m.x) || !isFinite(m.y) || !isFinite(m.radius) || m.radius <= 0) return;
            const r = m.radius;
            const flash = m.hitFlash > 0;
            const img = ASSETS.monster[m.spriteKey];
            const size = r * 2.2;

            drawImageWithFallback(ctx, img, m.x - size / 2, m.y - size / 2, size, size, function() {
                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.2)';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetY = 3;
                const grad = ctx.createRadialGradient(
                    isFinite(m.x - r * 0.3) ? m.x - r * 0.3 : m.x,
                    isFinite(m.y - r * 0.3) ? m.y - r * 0.3 : m.y,
                    2,
                    m.x, m.y,
                    r > 0 ? r : 1
                );
                if (flash) {
                    grad.addColorStop(0, '#ffffff');
                    grad.addColorStop(0.6, '#ffaaaa');
                    grad.addColorStop(1, m.color);
                } else {
                    grad.addColorStop(0, lightenColor(m.color, 40));
                    grad.addColorStop(0.7, m.color);
                    grad.addColorStop(1, darkenColor(m.color, 30));
                }
                ctx.beginPath();
                ctx.arc(m.x, m.y, r, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;
                ctx.strokeStyle = flash ? '#ff6b6b' : 'rgba(0,0,0,0.15)';
                ctx.lineWidth = 1.2;
                ctx.stroke();
                const marks = {
                    axe: '🪓',
                    council: '📜',
                    bow: '🏹',
                    eroding: '☣️',
                    warlord: '⚔️',
                    griffon: '🦅',
                    lykourgos: '👑',
                    dottore: '🎭'
                };
                if (marks[m.type]) {
                    ctx.font = m.isBoss ? '28px' : (m.isElite ? '24px' : '20px');
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#fff';
                    ctx.fillText(marks[m.type], m.x, m.y);
                }
                ctx.restore();
            });

            if (m.maxHp > 1) {
                const barW = r * 1.8,
                    barH = m.isBoss ? 6 : 4;
                const bx = m.x - barW / 2,
                    by = m.y - r - 8;
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(bx, by, barW, barH);
                ctx.fillStyle = m.isBoss ? '#ff4444' : '#2ed573';
                ctx.fillRect(bx, by, barW * (m.hp / m.maxHp), barH);
                ctx.font = m.isBoss ? '12px sans-serif' : '10px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillStyle = '#fff';
                ctx.fillText(`${Math.ceil(m.hp)}/${m.maxHp}`, m.x, by - 2);
            }

            if (m.frozen > 0) {
                ctx.save();
                ctx.globalAlpha = 0.5;
                ctx.fillStyle = '#a8d8ea';
                ctx.beginPath();
                ctx.arc(m.x, m.y, r, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                ctx.save();
                ctx.strokeStyle = '#a8d8ea';
                ctx.lineWidth = 3;
                ctx.shadowColor = '#a8d8ea';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(m.x, m.y, r + 2, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            if (m.element) {
                const iconKey = m.element;
                const imgBullet = ASSETS.bullet[iconKey];
                const size2 = 28;
                drawImageWithFallback(ctx, imgBullet, m.x - size2 / 2, m.y - r - 20 - size2, size2, size2, function() {
                    const icon = game.elementIcons[iconKey] || '?';
                    ctx.font = '22px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowBlur = 6;
                    ctx.fillStyle = '#fff';
                    ctx.fillText(icon, m.x, m.y - r - 14);
                    ctx.shadowBlur = 0;
                });
            }

            if (m._buff) {
                ctx.save();
                ctx.shadowColor = 'rgba(255,215,0,0.5)';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(m.x, m.y, r + 10, 0, Math.PI * 2);
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.restore();
                ctx.save();
                ctx.shadowColor = 'rgba(255,215,0,0.3)';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(m.x, m.y, r + 4, 0, Math.PI * 2);
                ctx.strokeStyle = '#ffaa00';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();
                ctx.font = '16px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillStyle = '#fff';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 4;
                ctx.fillText('💪', m.x, m.y - r - 30);
                ctx.shadowBlur = 0;
            }

            if (m._blinkTimer > 0) {
                if (m._blinkTimer % 6 < 3) {
                    ctx.save();
                    ctx.globalAlpha = 0.4;
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(m.x, m.y, m.radius * 1.6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }
            if (m._shadowTimer && m._shadowTimer > 0) {
                ctx.save();
                ctx.globalAlpha = m._shadowTimer / 30 * 0.3;
                ctx.fillStyle = '#aa88ff';
                ctx.beginPath();
                ctx.arc(m.x, m.y, m.radius * 0.8, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            if (m.isElite) {
                ctx.font = '20px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillStyle = '#ffd93d';
                ctx.fillText('💀', m.x, m.y - r - 6);
            }
            if (m.isBoss) {
                ctx.font = '28px sans-serif';
                ctx.fillStyle = '#ff4444';
                ctx.fillText('👑', m.x, m.y - r - 10);
            }
            if (m.isElite || m.isBoss) {
                let status = '';
                if (m.type === 'eroding') status = '侵蚀';
                else if (m.type === 'warlord') status = '斗将';
                else if (m.type === 'griffon') status = '狮鹫';
                else if (m.type === 'lykourgos') status = m.form === 'white' ? '白形态' : '黑形态';
                else if (m.type === 'dottore') status = '多托雷';
                if (status) {
                    ctx.font = '14px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.fillStyle = '#fff';
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowBlur = 4;
                    ctx.fillText(status, m.x, m.y - m.radius - 40);
                    ctx.shadowBlur = 0;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scaleX, scaleY);

            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#3d2a1a');
            grad.addColorStop(0.3, '#2a1e16');
            grad.addColorStop(0.7, '#1a1410');
            grad.addColorStop(1, '#0d0b08');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            ctx.save();
            ctx.globalAlpha = 0.12;
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                const baseY = H - 60 + i * 20;
                ctx.moveTo(0, baseY);
                for (let x = 0; x <= W; x += 10) {
                    const y = baseY - 30 * Math.sin(x * 0.008 + i * 1.2) - 20 * Math.sin(x * 0.015 + i * 0.7);
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(W, H);
                ctx.lineTo(0, H);
                ctx.closePath();
                ctx.fillStyle = i % 2 === 0 ? '#4a3520' : '#2a1a10';
                ctx.fill();
            }
            ctx.restore();

            for (const line of windLines) {
                ctx.save();
                ctx.globalAlpha = line.alpha;
                ctx.strokeStyle = 'rgba(220, 180, 80, 0.25)';
                ctx.lineWidth = line.width;
                ctx.beginPath();
                ctx.moveTo(line.x, line.y);
                ctx.quadraticCurveTo(line.x + line.length * 0.5, line.y - 20, line.x + line.length, line.y + 10);
                ctx.stroke();
                ctx.restore();
            }

            for (const leaf of bgLeaves) {
                ctx.save();
                ctx.translate(leaf.x, leaf.y);
                ctx.rotate(leaf.rotation);
                ctx.globalAlpha = 0.25;
                ctx.fillStyle = leaf.color;
                ctx.beginPath();
                const s = leaf.size;
                ctx.moveTo(0, -s);
                ctx.quadraticCurveTo(s, -s * 0.4, s * 0.6, 0);
                ctx.quadraticCurveTo(s, s * 0.4, 0, s);
                ctx.quadraticCurveTo(-s, s * 0.4, -s * 0.6, 0);
                ctx.quadraticCurveTo(-s, -s * 0.4, 0, -s);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            const bottomLine = H - 25;
            ctx.strokeStyle = 'rgba(255,70,70,0.15)';
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 12]);
            ctx.beginPath();
            ctx.moveTo(10, bottomLine);
            ctx.lineTo(W - 10, bottomLine);
            ctx.stroke();
            ctx.setLineDash([]);

            for (const m of monsters) {
                if (m.isDead) continue;
                if (m.type === 'eroding') {
                    ctx.save();
                    ctx.globalAlpha = 0.15;
                    ctx.beginPath();
                    ctx.arc(m.x, m.y, 200, 0, Math.PI * 2);
                    ctx.fillStyle = '#9b59b6';
                    ctx.fill();
                    ctx.globalAlpha = 0.3;
                    ctx.strokeStyle = '#9b59b6';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([8, 12]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.restore();
                    ctx.save();
                    ctx.globalAlpha = 0.1;
                    ctx.beginPath();
                    ctx.arc(m.x, m.y, 180, 0, Math.PI * 2);
                    ctx.fillStyle = '#8e44ad';
                    ctx.fill();
                    ctx.restore();
                }
            }

            for (const eb of enemyBullets) {
                if (eb.isDead) continue;
                if (eb.isShadowBall) {
                    ctx.save();
                    ctx.shadowColor = 'rgba(142, 68, 173, 0.5)';
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.arc(eb.x, eb.y, eb.radius, 0, Math.PI * 2);
                    ctx.fillStyle = eb.color;
                    ctx.fill();
                    ctx.strokeStyle = '#8e44ad';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.restore();
                    continue;
                }
                ctx.beginPath();
                ctx.arc(eb.x, eb.y, eb.radius, 0, Math.PI * 2);
                ctx.fillStyle = eb.color;
                ctx.shadowColor = eb.color;
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            if (game.skillActive && game.skillEye) {
                const eye = game.skillEye;
                if (eye && isFinite(eye.x) && isFinite(eye.y) && isFinite(eye.radius)) {
                    const progress = eye.timer / eye.duration;
                    ctx.save();
                    ctx.globalAlpha = 0.3 * (1 - progress * 0.5);
                    ctx.strokeStyle = '#00d2d3';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([10, 15]);
                    ctx.beginPath();
                    ctx.arc(eye.x, eye.y, eye.radius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.restore();
                    ctx.save();
                    ctx.translate(eye.x, eye.y);
                    ctx.rotate(eye.timer * 0.02);
                    for (let i = 0; i < 6; i++) {
                        const angle = i * Math.PI / 3;
                        const len = eye.radius * (0.3 + 0.5 * (1 - progress));
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(Math.cos(angle) * len, Math.sin(angle) * len);
                        ctx.strokeStyle = `hsla(190, 80%, 70%, ${0.3 * (1 - progress)})`;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                    ctx.restore();
                    const gradCenter = ctx.createRadialGradient(eye.x, eye.y, 0, eye.x, eye.y, 30);
                    gradCenter.addColorStop(0, `rgba(0, 210, 211, ${0.4 * (1 - progress)})`);
                    gradCenter.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.beginPath();
                    ctx.arc(eye.x, eye.y, 30, 0, Math.PI * 2);
                    ctx.fillStyle = gradCenter;
                    ctx.fill();
                }
            }

            for (const d of goldDrops) {
                if (!d || !isFinite(d.x) || !isFinite(d.y)) continue;
                const bobY = Math.sin(d.bob) * 3;
                const img = ASSETS.coin;
                const size = d.radius * 2;
                drawImageWithFallback(ctx, img, d.x - size / 2, d.y + bobY - size / 2, size, size, function() {
                    ctx.beginPath();
                    ctx.arc(d.x, d.y + bobY, d.radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#f9ca24';
                    ctx.shadowColor = '#f9ca24';
                    ctx.shadowBlur = 15;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    ctx.font = '16px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('💰', d.x, d.y + bobY);
                });
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillStyle = '#fff';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 4;
                ctx.fillText(`+${d.amount}`, d.x, d.y + bobY + d.radius + 2);
                ctx.shadowBlur = 0;
            }

            for (const d of diamondDrops) {
                if (!d || !isFinite(d.x) || !isFinite(d.y)) continue;
                const bobY = Math.sin(d.bob) * 3;
                const img = ASSETS.diamond;
                const size = d.radius * 2.2;
                drawImageWithFallback(ctx, img, d.x - size/2, d.y + bobY - size/2, size, size, function() {
                    ctx.save();
                    ctx.shadowColor = '#00d2d3';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(d.x, d.y + bobY, d.radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#00d2d3';
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.font = '16px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('💎', d.x, d.y + bobY);
                    ctx.restore();
                });
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillStyle = '#fff';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 4;
                ctx.fillText(`+${d.amount}`, d.x, d.y + bobY + d.radius + 2);
                ctx.shadowBlur = 0;
            }

            for (const d of healthPacks) {
                if (!d || !isFinite(d.x) || !isFinite(d.y)) continue;
                const bobY = Math.sin(d.bob) * 3;
                const img = ASSETS.health;
                const size = d.radius * 2.2;
                drawImageWithFallback(ctx, img, d.x - size/2, d.y + bobY - size/2, size, size, function() {
                    ctx.save();
                    ctx.shadowColor = '#ff6b6b';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(d.x, d.y + bobY, d.radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#ff6b6b';
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.font = '14px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('❤️', d.x, d.y + bobY);
                    ctx.restore();
                });
            }

            for (const eff of game.laserEffects) {
                if (!eff || !isFinite(eff.x) || !isFinite(eff.y)) continue;
                if (eff.phase === 'charging') {
                    const len = 800;
                    const endX = eff.x + Math.cos(eff.angle) * len;
                    const endY = eff.y + Math.sin(eff.angle) * len;
                    ctx.save();
                    ctx.setLineDash([10, 10]);
                    ctx.strokeStyle = 'rgba(255,0,0,0.5)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(eff.x, eff.y);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                    ctx.restore();
                    ctx.save();
                    const grad2 = ctx.createRadialGradient(eff.x, eff.y, 5, eff.x, eff.y, 40);
                    grad2.addColorStop(0, 'rgba(255,0,0,0.3)');
                    grad2.addColorStop(1, 'rgba(255,0,0,0)');
                    ctx.beginPath();
                    ctx.arc(eff.x, eff.y, 40, 0, Math.PI * 2);
                    ctx.fillStyle = grad2;
                    ctx.fill();
                    ctx.restore();
                } else if (eff.phase === 'firing') {
                    const len = 800;
                    const endX = eff.x + Math.cos(eff.angle) * len;
                    const endY = eff.y + Math.sin(eff.angle) * len;
                    ctx.save();
                    ctx.shadowColor = '#ff0000';
                    ctx.shadowBlur = 20;
                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 6;
                    ctx.beginPath();
                    ctx.moveTo(eff.x, eff.y);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                    ctx.restore();
                    ctx.save();
                    const grad3 = ctx.createLinearGradient(eff.x, eff.y, endX, endY);
                    grad3.addColorStop(0, 'rgba(255,0,0,0.2)');
                    grad3.addColorStop(0.5, 'rgba(255,0,0,0.1)');
                    grad3.addColorStop(1, 'rgba(255,0,0,0)');
                    ctx.strokeStyle = grad3;
                    ctx.lineWidth = 20;
                    ctx.beginPath();
                    ctx.moveTo(eff.x, eff.y);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                    ctx.restore();
                }
            }

            for (const m of monsters) {
                if (m.isDead) continue;
                drawMonster(m);
            }

            for (const b of bullets) {
                if (b.isDead) continue;
                if (!isFinite(b.x) || !isFinite(b.y) || !isFinite(b.radius) || b.radius <= 0) continue;
                const img = ASSETS.bullet[b.type];
                const size = b.radius * 2.5;
                if (b.isEmpowered) {
                    ctx.save();
                    ctx.shadowColor = '#00d2d3';
                    ctx.shadowBlur = 30;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius * 1.8, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0,210,211,0.2)';
                    ctx.fill();
                    ctx.restore();
                }
                drawImageWithFallback(ctx, img, b.x - size / 2, b.y - size / 2, size, size, function() {
                    ctx.save();
                    for (let t = 0; t < 2; t++) {
                        const alpha = 0.12 - t * 0.04;
                        ctx.beginPath();
                        ctx.arc(b.x - b.vx * t * 0.5, b.y - b.vy * t * 0.5, b.radius * (1 - t * 0.1), 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(116,185,255,${alpha})`;
                        ctx.fill();
                    }
                    const glow = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.radius * 2.5);
                    glow.addColorStop(0, b.glow);
                    glow.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius * 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = glow;
                    ctx.fill();
                    const grad2 = ctx.createRadialGradient(
                        isFinite(b.x - b.radius * 0.3) ? b.x - b.radius * 0.3 : b.x,
                        isFinite(b.y - b.radius * 0.3) ? b.y - b.radius * 0.3 : b.y,
                        1, b.x, b.y, b.radius
                    );
                    grad2.addColorStop(0, '#ffffff');
                    grad2.addColorStop(0.4, b.color);
                    grad2.addColorStop(1, darkenColor(b.color, 30));
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                    ctx.fillStyle = grad2;
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                    ctx.restore();
                });
                if (!(img && img.complete && img.naturalWidth > 0)) {
                    const icon = game.elementIcons[b.type] || '?';
                    ctx.font = '18px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#fff';
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowBlur = 4;
                    ctx.fillText(icon, b.x, b.y);
                    ctx.shadowBlur = 0;
                }
                if (b.chargeLevel > 0.8) {
                    ctx.strokeStyle = 'rgba(255,215,0,0.3)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius + 4, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            const tx = game.towerX,
                ty = game.towerY;
            const angle = angleTo({ x: tx, y: ty }, { x: game.mouseX, y: game.mouseY });

            const turretSize = 55;
            drawImageWithFallback(ctx, ASSETS.turret, tx - turretSize / 2, ty - turretSize / 2, turretSize, turretSize,
                function() {
                    ctx.save();
                    ctx.translate(tx, ty);
                    ctx.rotate(angle);
                    ctx.shadowColor = 'rgba(0,0,0,0.2)';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(0, 0, 26, 0, Math.PI * 2);
                    ctx.fillStyle = '#d4a017';
                    ctx.fill();
                    ctx.strokeStyle = '#b8860b';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(0, 0, 16, 0, Math.PI * 2);
                    ctx.fillStyle = '#f1c40f';
                    ctx.fill();
                    for (let i = 0; i < 12; i++) {
                        const a = i * Math.PI / 6 + angle;
                        const x1 = Math.cos(a) * 28;
                        const y1 = Math.sin(a) * 28;
                        const x2 = Math.cos(a) * 32;
                        const y2 = Math.sin(a) * 32;
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        ctx.strokeStyle = '#b8860b';
                        ctx.lineWidth = 3;
                        ctx.stroke();
                    }
                    ctx.restore();
                });

            if (game.isCharging) {
                const progress = game.chargeTime / game.maxChargeTime;
                const barX = tx - 40,
                    barY = ty - 50,
                    barW = 80,
                    barH = 8;
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.roundRect(barX, barY, barW, barH, 4);
                ctx.fill();
                ctx.fillStyle = `hsl(40, 100%, ${50 + progress * 30}%)`;
                ctx.roundRect(barX + 2, barY + 2, (barW - 4) * progress, barH - 4, 3);
                ctx.fill();
                ctx.font = '11px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.fillText(`${Math.round(progress * 100)}%`, tx, barY - 4);
            }

            const nextThree = getNextThreeTypes();
            const previewX = 20,
                previewY = 80;
            ctx.font = '24px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 6;
            ctx.fillStyle = '#fff';
            ctx.fillText('▶', previewX - 10, previewY + 6);
            for (let i = 0; i < nextThree.length; i++) {
                const type = nextThree[i];
                const x = previewX + 30 + i * 36;
                const iconEmoji = game.elementIcons[type] || '?';
                const img = ASSETS.bullet[type];
                const sizeIcon = 28;
                drawImageWithFallback(ctx, img, x - sizeIcon / 2, previewY - sizeIcon / 2, sizeIcon, sizeIcon, function() {
                    ctx.font = '28px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 6;
                    ctx.fillText(iconEmoji, x, previewY);
                    ctx.shadowBlur = 0;
                });
                ctx.beginPath();
                ctx.arc(x, previewY + 20, 4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fill();
            }
            ctx.shadowBlur = 0;

            ctx.strokeStyle = 'rgba(255,255,255,0.04)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 8]);
            ctx.beginPath();
            ctx.moveTo(tx, ty);
            ctx.lineTo(game.mouseX, game.mouseY);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.strokeStyle = 'rgba(255,255,255,0.12)';
            ctx.lineWidth = 1.2;
            const cs = 10;
            const cx = game.mouseX,
                cy = game.mouseY;
            ctx.beginPath();
            ctx.moveTo(cx - cs, cy);
            ctx.lineTo(cx + cs, cy);
            ctx.moveTo(cx, cy - cs);
            ctx.lineTo(cx, cy + cs);
            ctx.stroke();
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.beginPath();
            ctx.arc(cx, cy, cs * 1.4, 0, Math.PI * 2);
            ctx.stroke();

            const joyRadius = 60;
            const joyX = game.joystick.startX || 150;
            const joyY = game.joystick.startY || (H - 100);
            const touchX = joyX + game.joystick.dx * joyRadius * 0.6;
            const touchY = joyY + game.joystick.dy * joyRadius * 0.6;
            ctx.beginPath();
            ctx.arc(joyX, joyY, joyRadius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(touchX, touchY, 25, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();

            const skillBtnX = W - 80,
                skillBtnY = H - 80;
            const skillRadius = 45;
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(skillBtnX, skillBtnY, skillRadius, 0, Math.PI * 2);
            const canCast = game.skillReady && game.skillLevel >= 1 && !game.empoweredShot && !game.skillActive;
            ctx.fillStyle = canCast ? 'rgba(0, 210, 211, 0.6)' : 'rgba(100,100,100,0.4)';
            ctx.fill();
            ctx.strokeStyle = canCast ? '#00d2d3' : '#666';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.shadowBlur = 0;
            const skillImg = ASSETS.skill;
            const skillSize = skillRadius * 1.2;
            drawImageWithFallback(ctx, skillImg, skillBtnX - skillSize / 2, skillBtnY - skillSize / 2, skillSize, skillSize,
                function() {
                    ctx.font = '32px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#fff';
                    ctx.fillText('🌀', skillBtnX, skillBtnY);
                });
            const energyRatio = game.energy / game.maxEnergy;
            ctx.beginPath();
            ctx.arc(skillBtnX, skillBtnY, skillRadius + 6, -Math.PI / 2, -Math.PI / 2 + energyRatio * Math.PI * 2);
            ctx.strokeStyle = '#00d2d3';
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.font = '12px sans-serif';
            ctx.fillStyle = '#fff';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 4;
            if (game.empoweredShot) {
                ctx.fillText('✨ 已强化', skillBtnX, skillBtnY + skillRadius + 20);
            } else if (game.skillActive) {
                ctx.fillText('⏳ 风眼', skillBtnX, skillBtnY + skillRadius + 20);
            } else if (game.skillReady) {
                const cost = CONFIG.balance.skillEnergyCost;
                ctx.fillText(`⚡ 就绪 (${game.energy}/${cost})`, skillBtnX, skillBtnY + skillRadius + 20);
            } else {
                const need = CONFIG.balance.skillEnergyCost - game.energy;
                ctx.fillText(`⏳ 充能 ${need}`, skillBtnX, skillBtnY + skillRadius + 20);
            }
            ctx.shadowBlur = 0;
            ctx.restore();

            if (game.lykourgosEmpowerActive) {
                const remain = Math.max(0, Math.ceil((game.lykourgosEmpowerMaxTimer - game.lykourgosEmpowerTimer) / 60));
                ctx.save();
                ctx.font = 'bold 14px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillStyle = '#ffd700';
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 8;
                ctx.fillText(`⚡ 强化剩余 ${remain}s`, skillBtnX, skillBtnY - skillRadius - 12);
                ctx.restore();
            }

            for (const p of particles) {
                if (!p || !isFinite(p.x) || !isFinite(p.y)) continue;
                const alpha = p.life / p.maxLife;
                ctx.globalAlpha = alpha;
                if (p.isLeaf) {
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.life * 0.05);
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.moveTo(0, -p.radius);
                    ctx.quadraticCurveTo(p.radius, -p.radius * 0.3, p.radius * 0.5, 0);
                    ctx.quadraticCurveTo(p.radius, p.radius * 0.3, 0, p.radius);
                    ctx.quadraticCurveTo(-p.radius, p.radius * 0.3, -p.radius * 0.5, 0);
                    ctx.quadraticCurveTo(-p.radius, -p.radius * 0.3, 0, -p.radius);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                } else {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * alpha, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1;

            for (const ft of floatingTexts) {
                if (!ft || !isFinite(ft.x) || !isFinite(ft.y)) continue;
                ctx.globalAlpha = ft.alpha;
                ctx.font = `bold ${ft.size}px 'Segoe UI', sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 8;
                ctx.fillStyle = ft.color;
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.shadowBlur = 0;
            }
            ctx.globalAlpha = 1;

            if (toast) {
                ctx.save();
                const alpha = toast.alpha;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = 'rgba(0,0,0,0.35)';
                ctx.shadowColor = 'rgba(0,0,0,0.4)';
                ctx.shadowBlur = 15;
                const tw = 280,
                    th = 70;
                const tx2 = (W - tw) / 2,
                    ty2 = (H - th) / 2 - 20;
                ctx.beginPath();
                ctx.roundRect(tx2, ty2, tw, th, 18);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(241,196,15,0.4)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.roundRect(tx2, ty2, tw, th, 18);
                ctx.stroke();
                ctx.font = 'bold 36px "Microsoft YaHei", "PingFang SC", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const grad2 = ctx.createLinearGradient(tx2, ty2, tx2 + tw, ty2 + th);
                grad2.addColorStop(0, '#f1c40f');
                grad2.addColorStop(0.5, '#fff5b0');
                grad2.addColorStop(1, '#f1c40f');
                ctx.fillStyle = grad2;
                ctx.shadowColor = 'rgba(241,196,15,0.4)';
                ctx.shadowBlur = 20;
                ctx.fillText(toast.text, W / 2, H / 2 - 20);
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            if (game.waveActive && monsters.length === 0 && game.monstersSpawned < game.monstersInWave) {
                ctx.font = '13px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillStyle = 'rgba(255,255,255,0.25)';
                ctx.fillText(`⚔️ 生成中... ${game.monstersSpawned}/${game.monstersInWave}`, W / 2, 28);
            }
            if (!game.waveActive && !game.isOver && game.waveCooldown > 0) {
                ctx.font = '15px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillText(`下一波 ${Math.ceil(game.waveCooldown / 60)}s`, W / 2, 28);
            }

            if (game.paused || game.upgradeOpen || game.bestiaryOpen || game.settingsOpen) {
                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(0, 0, W, H);
                ctx.font = 'bold 44px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#fff';
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = 16;
                let msg = '';
                if (game.upgradeOpen) msg = '📈 升级中...';
                else if (game.bestiaryOpen) msg = '📖 图鉴';
                else if (game.settingsOpen) msg = '⚙️ 设置';
                else msg = '⏸ 暂停中';
                ctx.fillText(msg, W / 2, H / 2);
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            ctx.font = '12px "Segoe UI", sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'bottom';
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            const cd = game.cooldownMax,
                charge = game.maxChargeTime;
            ctx.fillText(`冷却${(cd/60).toFixed(2)}s · 蓄力${(charge/60).toFixed(2)}s · 移速${game.towerSpeed.toFixed(1)}px/帧 · WASD移动`,
                14, H - 8);

            ctx.restore();
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                this.closePath();
                return this;
            };
        }

        function lightenColor(hex, amt) {
            let r = parseInt(hex.slice(1, 3), 16),
                g = parseInt(hex.slice(3, 5), 16),
                b = parseInt(hex.slice(5, 7), 16);
            r = Math.min(255, r + amt);
            g = Math.min(255, g + amt);
            b = Math.min(255, b + amt);
            return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
        }

        function darkenColor(hex, amt) {
            let r = parseInt(hex.slice(1, 3), 16),
                g = parseInt(hex.slice(3, 5), 16),
                b = parseInt(hex.slice(5, 7), 16);
            r = Math.max(0, r - amt);
            g = Math.max(0, g - amt);
            b = Math.max(0, b - amt);
            return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
        }

        // ---------- UI ----------
        function updateUI() {
            waveDisplay.textContent = game.wave;
            goldDisplay.textContent = game.gold;
            lifeDisplay.textContent = `${game.lives}/${game.maxLives}`;
            killsDisplay.textContent = game.kills;
            scoreDisplay.textContent = game.score;
            highScoreDisplay.textContent = window.GameStats.highScore;
            energyDisplay.textContent = `${Math.floor(game.energy)}/${game.maxEnergy}`;
            diamondDisplay.textContent = GlobalProgress.diamond;
            updateModalGold();
        }

        function updateModalGold() {
            modalGold.textContent = game.gold;
            const modalCoin = document.getElementById('modalCoinIcon');
            if (ASSETS.coin && ASSETS.coin.complete && ASSETS.coin.naturalWidth > 0) {
                modalCoin.className = 'coin-icon';
                modalCoin.style.backgroundImage = `url('assets/coin_icon.png')`;
            } else {
                modalCoin.className = 'coin-icon fallback';
                modalCoin.style.backgroundImage = 'none';
                modalCoin.textContent = '🪙';
            }
        }

        // ---------- 升级面板 ----------
        function renderUpgradePanel() {
            let html = '';
            html += `<div class="upgrade-group"><h3>⚙️ 基础属性</h3>`;
            const baseItems = [
                { key: 'attack', label: '⚔️ 攻击力', level: game.attackLevel, cost: getUpgradeCost('attack'),
                    desc: `当前 ${getAttack()}` },
                { key: 'attackSpeed', label: '🏹 攻击速度', level: game.attackSpeedLevel, cost: getUpgradeCost('attackSpeed'),
                    desc: `冷却${(game.cooldownMax/60).toFixed(2)}s / 蓄力${(game.maxChargeTime/60).toFixed(2)}s` },
                { key: 'health', label: '❤️ 生命上限', level: game.healthLevel, cost: getUpgradeCost('health'),
                    desc: `当前 ${getMaxLives()}` },
                { key: 'bounce', label: '🌀 弹射次数', level: game.bounceLevel, cost: getUpgradeCost('bounce'),
                    desc: `当前 ${game.bounceLevel}次` },
                { key: 'moveSpeed', label: '💨 移动速度', level: game.moveSpeedLevel, cost: getUpgradeCost('moveSpeed'),
                    desc: `当前 ${game.towerSpeed.toFixed(1)}px/帧` },
                { key: 'gold', label: '💰 金币获取', level: game.goldLevel, cost: getUpgradeCost('gold'),
                    desc: `当前 +${getGoldBonus()} 金币` },
                { key: 'healthRegen', label: '💚 自然恢复速度', level: game.healthRegenLevel, cost: getUpgradeCost('healthRegen'),
                    desc: `每 ${getRegenInterval().toFixed(1)} 秒+1血` },
            ];
            for (const item of baseItems) {
                const canAfford = game.gold >= item.cost;
                const isMaxed = (item.key === 'healthRegen' && game.healthRegenLevel >= CONFIG.upgrades.healthRegen.maxLevel);
                const disabled = !canAfford || game.isOver || isMaxed ? 'disabled' : '';
                const levelDisplay = isMaxed ? '已满级' : `Lv.${item.level}`;
                const upgradeText = isMaxed ? '已满级' : '升级';
                html += `
                    <div class="upgrade-item">
                        <div class="info"><span class="label">${item.label}</span><span class="level">${levelDisplay}</span><span class="desc">${item.desc}</span></div>
                        <div class="action">
                            <span class="cost">💰${item.cost}</span>
                            <button data-key="${item.key}" ${disabled}>${upgradeText}</button>
                        </div>
                    </div>
                `;
            }
            html += `</div>`;

            html += `<div class="upgrade-group"><h3>✨ 元素与技能</h3>`;
            const elementItems = [
                { key: 'elementMastery', label: '🌟 元素精通', level: game.elementMasteryLevel,
                    cost: getUpgradeCost('elementMastery'),
                    desc: `当前加成 ${((getElementMasteryBonus()-1)*100).toFixed(0)}%` },
                { key: 'energyRecharge', label: '⚡ 元素充能', level: game.energyRechargeLevel,
                    cost: getUpgradeCost('energyRecharge'),
                    desc: `当前加成 ${((getEnergyRechargeBonus()-1)*100).toFixed(0)}%` },
                { key: 'skill', label: '🌀 技能等级', level: game.skillLevel,
                    cost: getUpgradeCost('skill'),
                    desc: game.skillLevel === 0 ? '未解锁' :
                        `强化弹${getSkillDamageMultiplier().toFixed(1)}倍 · 风眼范围${getSkillEyeRadius()} · 伤害${Math.floor(getSkillEyeDamage())}` },
            ];
            for (const item of elementItems) {
                const canAfford = game.gold >= item.cost;
                const isMaxed = (item.key === 'skill' && game.skillLevel >= CONFIG.upgrades.skill.maxLevel) ||
                                (item.key === 'elementMastery' && game.elementMasteryLevel >= CONFIG.upgrades.elementMastery.maxLevel) ||
                                (item.key === 'energyRecharge' && game.energyRechargeLevel >= CONFIG.upgrades.energyRecharge.maxLevel);
                const disabled = !canAfford || game.isOver || isMaxed ? 'disabled' : '';
                const btnText = item.key === 'skill' ? (game.skillLevel === 0 ? '解锁' : '升级') : '升级';
                const levelDisplay = isMaxed ? '已满级' : `Lv.${item.level}`;
                html += `
                    <div class="upgrade-item">
                        <div class="info"><span class="label">${item.label}</span><span class="level">${levelDisplay}</span><span class="desc">${item.desc}</span></div>
                        <div class="action">
                            <span class="cost">💰${item.cost}</span>
                            <button data-key="${item.key}" ${disabled}>${btnText}</button>
                        </div>
                    </div>
                `;
            }
            html += `</div>`;

            html += `<div class="upgrade-group"><h3>🐾 怪物削弱</h3>`;
            const monsterSpeedMax = CONFIG.upgrades.monsterSpeed.maxLevel;
            const isMonsterSpeedMaxed = game.monsterSpeedLevel >= monsterSpeedMax;
            html += `<div class="upgrade-item">
                        <div class="info"><span class="label">🐌 怪物移速降低</span><span class="level">${isMonsterSpeedMaxed ? '已满级' : 'Lv.'+game.monsterSpeedLevel}</span><span class="desc">当前速度 ${(getMonsterSpeedMultiplier()*100).toFixed(0)}%</span></div>
                        <div class="action">
                            <span class="cost">💰${getUpgradeCost('monsterSpeed')}</span>
                            <button data-key="monsterSpeed" ${game.gold>=getUpgradeCost('monsterSpeed') && !game.isOver && !isMonsterSpeedMaxed ? '' : 'disabled'}>${isMonsterSpeedMaxed ? '已满级' : '升级'}</button>
                        </div>
                    </div>`;
            html += `</div>`;

            upgradeContent.innerHTML = html;
            document.querySelectorAll('[data-key]').forEach(btn => {
                btn.addEventListener('click', function() {
                    const key = this.dataset.key;
                    if (key === 'skill') {
                        upgradeSkill();
                    } else {
                        upgradeBase(key);
                    }
                });
            });
        }

        function upgradeSkill() {
            const cost = getUpgradeCost('skill');
            if (!spendGold(cost)) return;
            game.skillLevel++;
            GlobalProgress.skillLevel = game.skillLevel;
            saveProgress();
            spawnFloatingText(W / 2, H / 2 + 30, `🌀 技能等级 Lv.${game.skillLevel}`, '#00d2d3', 24);
            updateUI();
            renderUpgradePanel();
        }

        function spendGold(amount) {
            if (game.gold >= amount) {
                game.gold -= amount;
                updateUI();
                updateModalGold();
                return true;
            }
            return false;
        }

        function upgradeBase(type) {
            const cost = getUpgradeCost(type);
            if (!spendGold(cost)) return;
            if (type === 'attack') { game.attackLevel++;
                GlobalProgress.attackLevel = game.attackLevel;
                saveProgress();

                }
            });

            document.getElementById('settleBtn')?.addEventListener('click', function() {
                if (game.isOver) return;
                if (game.score > 0) {
                    GlobalProgress.diamond += game.score;
                    game.score = 0;
                    saveProgress();
                    spawnFloatingText(W/2, H/2 - 40, `💎 积分转为钻石: +${game.score}`, '#00d2d3', 28);
                }
                saveProgress();
                window.location.href = 'index.html';
            });

            if (game.cheatMode) {
                document.getElementById('cheatControls').style.display = '';
                document.getElementById('cheatGoldControl').style.display = '';
                document.getElementById('cheatLifeControl').style.display = '';
                highScoreDisplay.style.color = '#ff6b6b';
            }
        }

        // =============================================================
        //  状态管理
        // =============================================================
        function setGameState(newState) {
            if (game._state === newState) return;
            const prev = game._state;
            switch (prev) {
                case 'upgrading':
                    game.upgradeOpen = false;
                    upgradeModal.classList.remove('show');
                    break;
                case 'bestiary':
                    game.bestiaryOpen = false;
                    bestiaryModal.classList.remove('show');
                    break;
                case 'settings':
                    game.settingsOpen = false;
                    settingsModal.classList.remove('show');
                    break;
                case 'paused':
                    game.paused = false;
                    break;
                default: break;
            }
            game._state = newState;
            switch (newState) {
                case 'playing':
                    game.paused = false;
                    game.upgradeOpen = false;
                    game.bestiaryOpen = false;
                    game.settingsOpen = false;
                    upgradeModal.classList.remove('show');
                    bestiaryModal.classList.remove('show');
                    settingsModal.classList.remove('show');
                    break;
                case 'paused':
                    game.paused = true;
                    break;
                case 'upgrading':
                    game.upgradeOpen = true;
                    upgradeModal.classList.add('show');
                    renderUpgradePanel();
                    break;
                case 'bestiary':
                    game.bestiaryOpen = true;
                    bestiaryModal.classList.add('show');
                    renderBestiary();
                    break;
                case 'settings':
                    game.settingsOpen = true;
                    settingsModal.classList.add('show');
                    renderSettings();
                    break;
                case 'gameover':
                    game.isOver = true;
                    break;
                default: break;
            }
        }

        function openUpgradePanel() {
            if (game.isOver || game.paused) return;
            setGameState('upgrading');
        }
        function closeUpgradePanel() {
            if (game._state === 'upgrading') setGameState('playing');
        }
        function openBestiary() {
            if (game.isOver || game.paused) return;
            setGameState('bestiary');
        }
        function closeBestiary() {
            if (game._state === 'bestiary') setGameState('playing');
        }
        function openSettings() {
            if (game.isOver) return;
            setGameState('settings');
        }
        function closeSettings() {
            if (game._state === 'settings') setGameState('playing');
        }
        function togglePauseAndSettings() {
            if (game.isOver) return;
            if (game._state === 'settings' || game._state === 'paused') {
                setGameState('playing');
            } else {
                setGameState('settings');
            }
        }

        // ---------- 游戏结束 ----------
        function gameOver() {
            setGameState('gameover');
            game.waveActive = false;
            if (game.score > 0) {
                GlobalProgress.diamond += game.score;
                game.score = 0;
                saveProgress();
                spawnFloatingText(W/2, H/2 - 40, `💎 积分转为钻石: +${game.score}`, '#00d2d3', 28);
            }
            saveProgress();
            finalWave.textContent = game.wave;
            finalKills.textContent = game.kills;
            finalScore.textContent = game.score;
            finalHigh.textContent = window.GameStats.highScore;
            gameOverlay.classList.add('show');
            if (game.upgradeOpen) closeUpgradePanel();
            if (game.bestiaryOpen) closeBestiary();
            if (game.settingsOpen) closeSettings();
            hideBossHealthBar();
            game.lykourgosEmpowerActive = false;
            updateUI();
        }

        // ---------- 重置 ----------
        function resetGame() {
            game.wave = startData.startWave || 1;
            game.gold = 0;
            game.lives = 10;
            game.maxLives = getMaxLives();
            game.kills = 0;
            game.score = 0;
            game.isOver = false;
            game.waveActive = false;
            game.monstersInWave = 0;
            game.monstersSpawned = 0;
            game.waveCooldown = 45;
            game.attackLevel = GlobalProgress.attackLevel;
            game.attackSpeedLevel = GlobalProgress.attackSpeedLevel;
            game.healthLevel = GlobalProgress.healthLevel;
            game.bounceLevel = GlobalProgress.bounceLevel;
            game.moveSpeedLevel = GlobalProgress.moveSpeedLevel;
            game.goldLevel = GlobalProgress.goldLevel;
            game.skillLevel = GlobalProgress.skillLevel;
            game.elementMasteryLevel = GlobalProgress.elementMasteryLevel;
            game.energyRechargeLevel = GlobalProgress.energyRechargeLevel;
            game.monsterSpeedLevel = GlobalProgress.monsterSpeedLevel;
            game.healthRegenLevel = GlobalProgress.healthRegenLevel;
            game.damage = getAttack();
            game.cooldownMax = getCooldownMax();
            game.maxChargeTime = getMaxChargeTime();
            game.towerSpeed = getTowerSpeed();
            game.goldBonus = getGoldBonus();
            game.energy = 0;
            game.empoweredShot = false;
            game.skillActive = false;
            game.skillEye = null;
            game.affectedMonsters = [];
            game.isCharging = false;
            game.chargeTime = 0;
            game.chargeLevel = 0;
            game.cooldownTimer = 0;
            game.paused = false;
            game.upgradeOpen = false;
            game.bestiaryOpen = false;
            game.settingsOpen = false;
            game.regenTimer = 0;
            game._state = 'playing';
            game.skillReady = false;
            game.lives = game.maxLives;
            game.lykourgosEmpowerActive = false;
            game.lykourgosEmpowerTriggered = false;
            game.lykourgosEmpowerTimer = 0;
            initBulletQueue();
            game.laserEffects = [];
            goldDrops = [];
            diamondDrops = [];
            healthPacks = [];
            bullets = [];
            monsters = [];
            particles = [];
            floatingTexts = [];
            enemyBullets = [];
            toast = null;
            hideBossHealthBar();

            gameOverlay.classList.remove('show');
            upgradeModal.classList.remove('show');
            bestiaryModal.classList.remove('show');
            settingsModal.classList.remove('show');
            highScoreDisplay.style.color = '#fd79a8';
            updateUI();
            if (!game.isOver) {
                game.waveCooldown = 0;
                startWave();
            }
        }

        // ---------- 触摸事件 ----------
        let joystickTouchId = null;

        function handleTouchStart(e) {
            e.preventDefault();
            const touch = e.changedTouches[0];
            const pos = toLogic(touch.clientX, touch.clientY);
            const skillLogicX = W - 80, skillLogicY = H - 80;

            if (dist(pos, { x: skillLogicX, y: skillLogicY }) < 60) {
                castSkill();
                return;
            }
            if (pos.y < 60) return;

            game.joystick.active = true;
            game.joystick.touchId = touch.identifier;
            game.joystick.startX = clamp(pos.x, 100, W - 100);
            game.joystick.startY = clamp(pos.y, 100, H - 100);
            updateJoystick(touch);

            game.mouseX = pos.x;
            game.mouseY = pos.y;
            if (game.cooldownTimer === 0) {
                game.isCharging = true;
                game.chargeTime = 0;
                game.chargeLevel = 0;
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            for (const touch of e.changedTouches) {
                if (touch.identifier === game.joystick.touchId) {
                    updateJoystick(touch);
                } else {
                    const pos = toLogic(touch.clientX, touch.clientY);
                    game.mouseX = pos.x;
                    game.mouseY = pos.y;
                }
            }
        }

        function updateJoystick(touch) {
            const pos = toLogic(touch.clientX, touch.clientY);
            const joyLogicX = game.joystick.startX || 150;
            const joyLogicY = game.joystick.startY || (H - 100);
            const dx = pos.x - joyLogicX;
            const dy = pos.y - joyLogicY;
            const maxDist = 60;
            const len = Math.hypot(dx, dy);
            if (len > maxDist) {
                game.joystick.dx = (dx / len) * (maxDist / maxDist);
                game.joystick.dy = (dy / len) * (maxDist / maxDist);
            } else {
                game.joystick.dx = dx / maxDist;
                game.joystick.dy = dy / maxDist;
            }
            game.joystick.dx = clamp(game.joystick.dx, -1, 1);
            game.joystick.dy = clamp(game.joystick.dy, -1, 1);
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            for (const touch of e.changedTouches) {
                if (touch.identifier === game.joystick.touchId) {
                    game.joystick.active = false;
                    game.joystick.dx = 0;
                    game.joystick.dy = 0;
                    game.joystick.touchId = null;
                    game.joystick.startX = 150;
                    game.joystick.startY = H - 100;
                }
            }
            if (game.isCharging && !game.isOver && !game.paused && !game.upgradeOpen && !game.bestiaryOpen && !game.settingsOpen) {
                fireBullet(game.chargeLevel);
            }
            game.isCharging = false;
        }

        canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
        canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

        // 鼠标事件
        canvas.addEventListener('mousemove', (e) => {
            const pos = toLogic(e.clientX, e.clientY);
            game.mouseX = pos.x;
            game.mouseY = pos.y;
        });

        canvas.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            e.preventDefault();
            if (game.isOver || game.paused || game.upgradeOpen || game.bestiaryOpen || game.settingsOpen) return;
            if (game.cooldownTimer > 0) return;
            const pos = toLogic(e.clientX, e.clientY);
            const skillLogicX = W - 80, skillLogicY = H - 80;
            if (dist(pos, { x: skillLogicX, y: skillLogicY }) < 60) {
                castSkill();
                return;
            }
            game.isCharging = true;
            game.chargeTime = 0;
            game.chargeLevel = 0;
        });

        canvas.addEventListener('mouseup', (e) => {
            if (e.button !== 0) return;
            e.preventDefault();
            if (game.isCharging && !game.isOver && !game.paused && !game.upgradeOpen && !game.bestiaryOpen && !game.settingsOpen) {
                fireBullet(game.chargeLevel);
            }
            game.isCharging = false;
        });

        canvas.addEventListener('mouseleave', () => {
            if (game.isCharging) { game.isCharging = false;
                game.chargeTime = 0;
                game.chargeLevel = 0; }
        });

        // 键盘
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            game.keys[key] = true;
            if (key === 'Escape' || key === 'p' || key === 'P') {
                e.preventDefault();
                togglePauseAndSettings();
            }
            if (key === 'u' || key === 'U') {
                e.preventDefault();
                if (!game.isOver && !game.paused) {
                    if (game.upgradeOpen) closeUpgradePanel();
                    else openUpgradePanel();
                }
            }
            if (key === ' ' || key === 'Space') {
                e.preventDefault();
                castSkill();
            }
            if ((key === 'r' || key === 'R') && game.isOver) {
                resetGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            game.keys[e.key] = false;
        });

        // 按钮
        settingsBtn.addEventListener('click', togglePauseAndSettings);
        upgradeBtn.addEventListener('click', openUpgradePanel);
        bestiaryBtn.addEventListener('click', openBestiary);
        modalCloseBtn.addEventListener('click', closeUpgradePanel);
        bestiaryCloseBtn.addEventListener('click', closeBestiary);
        settingsCloseBtn.addEventListener('click', closeSettings);
        upgradeModal.addEventListener('click', function(e) { if (e.target === this) closeUpgradePanel(); });
        bestiaryModal.addEventListener('click', function(e) { if (e.target === this) closeBestiary(); });
        settingsModal.addEventListener('click', function(e) { if (e.target === this) closeSettings(); });
        restartBtn.addEventListener('click', resetGame);

        // ---------- 加载资源并启动 ----------
        loadAssets(() => {
            console.log('✅ 贴图加载完成（或使用备用绘制）');
            initBulletQueue();
            game.wave = startData.startWave || 1;
            game.maxLives = getMaxLives();
            game.lives = game.maxLives;
            game._state = 'playing';
            game.energy = 0;
            game.skillReady = false;
            game.lykourgosEmpowerActive = false;
            game.lykourgosEmpowerTriggered = false;
            updateUI();
            game.waveCooldown = 0;
            startWave();
            gameLoop();
        });

        function gameLoop() {
            update();
            updateBgLeaves();
            updateWindLines();
            draw();
            requestAnimationFrame(gameLoop);
        }

        console.log('🍁 永动机的归途是听凭风引 · 最终完整版');
        console.log(`📌 起始波次: ${startData.startWave}, 角色: ${startData.character}, 自动射击: ${startData.autoShoot}`);
        console.log('⌨️  ESC/P 暂停 | 空格技能 | U 升级');
        console.log('⚡ 大招消耗150能量，击杀+1能量，反应+5能量');
        console.log('💥 Boss积分20，分身血量0.05倍，激光伤害1');
        console.log('📦 Boss移动限制Y轴，不会触底');
    </script>
</body>
</html>
