<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>永动机的归途是听凭风引 · 游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-touch-callout: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0b08; font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif; }
        canvas { display: block; width: 100%; height: 100%; background: radial-gradient(ellipse at center, #2a1e1a, #0d0b08); cursor: crosshair; touch-action: none; }
        #topUI {
            position: absolute; top: 0; left: 0; width: 100%; z-index: 10;
            padding: 4px 8px; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
            display: flex; flex-wrap: wrap; align-items: center; gap: 4px 8px;
            font-size: 13px; color: #e8f0fe; border-bottom: 1px solid rgba(255,255,255,0.06);
            min-height: 38px; pointer-events: none;
        }
        #topUI>* { pointer-events: auto; }
        #topUI .stat {
            display: flex; align-items: center; gap: 3px;
            background: rgba(0,0,0,0.3); padding: 1px 8px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.06); white-space: nowrap; font-size: 12px; color: #e8f0fe;
        }
        #topUI .stat .num { color: #ffd93d; font-weight: bold; min-width: 14px; text-align: center; }
        #topUI .stat .num.life { color: #ff6b6b; }
        #topUI .stat .num.kills { color: #74b9ff; }
        #topUI .stat .num.wave { color: #a29bfe; }
        #topUI .stat .num.score { color: #f9ca24; }
        #topUI .stat .num.high { color: #fd79a8; }
        #topUI .stat .num.energy { color: #00d2d3; }
        #topUI .stat .num.diamond { color: #00d2d3; }
        #topUI .stat .icon-img {
            width: 18px; height: 18px; display: inline-block;
            background-size: contain; background-repeat: no-repeat;
            background-position: center; vertical-align: middle;
        }
        #topUI .stat .icon-img.fallback { background-image: none; }
        #topUI .btn-group { display: flex; gap: 4px; margin-left: auto; flex-wrap: wrap; }
        #topUI .btn-group button { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #e8f0fe; padding: 1px 10px; border-radius: 16px; font-size: 12px; cursor: pointer; font-weight: 600; transition: 0.2s; font-family: inherit; pointer-events: auto; line-height: 1.6; }
        #topUI .btn-group button:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,215,0,0.4); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: #1a2a40; border-radius: 20px; padding: 20px; max-width: 500px; width: 92%; max-height: 85vh; overflow-y: auto; border: 1px solid rgba(255,215,0,0.2); box-shadow: 0 20px 60px rgba(0,0,0,0.8); color: #e8f0fe; }
        .modal-box h2 { text-align: center; color: #f1c40f; margin-bottom: 12px; font-size: 22px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .modal-box h2 .close-btn { background: none; border: none; color: #ff6b6b; font-size: 26px; cursor: pointer; transition: 0.2s; }
        .modal-box h2 .close-btn:hover { transform: scale(1.2); }
        .settings-group { margin-bottom: 14px; }
        .settings-group h3 { color: #74b9ff; font-size: 15px; margin-bottom: 4px; border-left: 4px solid #f1c40f; padding-left: 8px; }
        .settings-item { display: flex; justify-content: space-between; align-items: center; padding: 3px 6px; background: rgba(255,255,255,0.04); border-radius: 6px; margin-bottom: 2px; border: 1px solid transparent; font-size: 13px; flex-wrap: wrap; gap: 4px; }
        .settings-item label { font-weight: 500; color: #ddd; }
        .settings-item input[type="range"] { width: 120px; background: #333; height: 4px; border-radius: 2px; -webkit-appearance: none; }
        .settings-item input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #f1c40f; cursor: pointer; }
        .settings-item input[type="number"] { width: 70px; background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
        .settings-item .cheat-toggle { display: flex; align-items: center; gap: 8px; }
        .settings-item .cheat-toggle input[type="checkbox"] { width: 18px; height: 18px; accent-color: #f1c40f; }
        .settings-item .btn-sm { background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.3); color: #fff; padding: 1px 12px; border-radius: 14px; font-weight: 600; cursor: pointer; font-family: inherit; font-size: 12px; transition: 0.2s; }
        .settings-item .btn-sm:hover { background: rgba(255,215,0,0.3); }
        .settings-item .btn-sm:disabled { opacity: 0.3; cursor: not-allowed; }
        .settings-item .value-display { color: #ffd93d; font-weight: bold; min-width: 30px; text-align: center; }
        .settings-item .key-hint { color: #888; font-size: 11px; margin-left: 8px; }
        .upgrade-group { margin-bottom: 14px; }
        .upgrade-group h3 { color: #74b9ff; font-size: 15px; margin-bottom: 4px; border-left: 4px solid #f1c40f; padding-left: 8px; }
        .upgrade-item { display: flex; justify-content: space-between; align-items: center; padding: 3px 6px; background: rgba(255,255,255,0.04); border-radius: 6px; margin-bottom: 2px; border: 1px solid transparent; transition: 0.15s; font-size: 13px; flex-wrap: wrap; gap: 4px; }
        .upgrade-item:hover { border-color: rgba(255,215,0,0.2); background: rgba(255,255,255,0.08); }
        .upgrade-item .info { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .upgrade-item .info .label { font-weight: 500; }
        .upgrade-item .info .level { color: #ffd93d; }
        .upgrade-item .info .desc { color: #aab; font-size: 12px; }
        .upgrade-item .action { display: flex; align-items: center; gap: 4px; }
        .upgrade-item .action .cost { color: #f9ca24; font-weight: 700; font-size: 12px; }
        .upgrade-item .action button { background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.3); color: #fff; padding: 1px 8px; border-radius: 14px; font-weight: 600; cursor: pointer; font-family: inherit; font-size: 12px; transition: 0.2s; }
        .upgrade-item .action button:hover:not(:disabled) { background: rgba(255,215,0,0.3); transform: scale(1.02); }
        .upgrade-item .action button:disabled { opacity: 0.3; cursor: not-allowed; }
        .modal-box .total-gold {
            text-align: right; color: #f9ca24; font-size: 16px; margin-top: 8px;
            display: flex; justify-content: flex-end; align-items: center; gap: 6px;
        }
        .modal-box .total-gold .coin-icon {
            width: 20px; height: 20px; display: inline-block;
            background-size: contain; background-repeat: no-repeat;
            background-image: url('assets/coin_icon.png');
            background-position: center;
        }
        .modal-box .total-gold .coin-icon.fallback { background-image: none; }
        .bestiary-entry { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 13px; line-height: 1.4; }
        .bestiary-entry .name { font-weight: 600; color: #ffd93d; }
        .bestiary-entry .desc { color: #aab; margin-left: 8px; }
        #gameOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; z-index: 20; pointer-events: auto; }
        #gameOverlay.show { display: flex; }
        #gameOverlay h1 { font-size: 40px; font-weight: 900; text-shadow: 0 0 40px rgba(255,70,70,0.5); margin-bottom: 6px; }
        #gameOverlay .sub { font-size: 16px; opacity: 0.8; margin-bottom: 12px; }
        #gameOverlay .stats-final { display: flex; gap: 20px; font-size: 14px; margin-bottom: 16px; background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.06); flex-wrap: wrap; justify-content: center; }
        #gameOverlay .stats-final span { opacity: 0.7; }
        #gameOverlay .stats-final strong { color: #ffd93d; }
        #gameOverlay .restart-btn { background: #ff6b6b; border: none; color: #fff; padding: 10px 32px; border-radius: 40px; font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: 0 8px 24px rgba(255,107,107,0.3); font-family: inherit; }
        #gameOverlay .restart-btn:hover { transform: scale(1.05); background: #ff5252; }
        @media (max-width:600px) { #topUI { font-size: 10px; padding: 2px 4px; min-height: 30px; } #topUI .stat { padding: 0 5px; font-size: 9px; } #topUI .btn-group button { font-size: 9px; padding: 0 6px; } .modal-box { padding: 14px; } .upgrade-item { font-size: 11px; } .settings-item input[type="range"] { width: 80px; } .settings-item input[type="number"] { width: 60px; } }
        #bossHealthBar {
            position: absolute;
            top: 48px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            max-width: 500px;
            height: 18px;
            background: rgba(0,0,0,0.7);
            border-radius: 12px;
            border: 2px solid rgba(255,70,70,0.5);
            z-index: 15;
            display: none;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255,0,0,0.2);
        }
        #bossHealthBar .fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff4444, #ff8800);
            border-radius: 10px;
            transition: width 0.15s ease;
        }
        #bossHealthBar .label {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
            letter-spacing: 0.5px;
        }
        #bossHealthBar .label .hp-text {
            margin-left: 6px;
            font-size: 10px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <!-- Boss血条 -->
    <div id="bossHealthBar">
        <div class="fill" id="bossHealthFill" style="width:100%;"></div>
        <div class="label" id="bossHealthLabel">👑 BOSS <span class="hp-text" id="bossHpText">100%</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div id="topUI">
        <div class="stat"><span>🌊</span>波次 <span class="num wave" id="waveDisplay">1</span></div>
        <div class="stat">
            <span class="icon-img" id="coinIconTop" style="background-image:url('assets/coin_icon.png');"></span>
            <span class="num" id="goldDisplay">0</span>
        </div>
        <div class="stat"><span>❤️</span>生命 <span class="num life" id="lifeDisplay">10/30</span></div>
        <div class="stat">
            <span class="icon-img" id="diamondIconTop" style="background-image:url('assets/diamond.png');"></span>
            <span class="num diamond" id="diamondDisplay">0</span>
        </div>
        <div class="stat"><span>💀</span>击杀 <span class="num kills" id="killsDisplay">0</span></div>
        <div class="stat"><span>🏅</span>积分 <span class="num score" id="scoreDisplay">0</span></div>
        <div class="stat"><span>🏆</span>最高 <span class="num high" id="highScoreDisplay">0</span></div>
        <div class="stat"><span>⚡</span>能量 <span class="num energy" id="energyDisplay">0/250</span></div>
        <div class="btn-group">
            <button id="settingsBtn">⏸ 暂停</button>
            <button id="upgradeBtn">📈 升级</button>
            <button id="bestiaryBtn">📖 图鉴</button>
        </div>
    </div>
    <div id="gameOverlay">
        <h1>💀 风止 · 叶落</h1>
        <div class="sub">永动机的归途是听凭风引……</div>
        <div class="stats-final">
            <span>🏆 波次 <strong id="finalWave">1</strong></span>
            <span>💀 杀敌 <strong id="finalKills">0</strong></span>
            <span>🏅 积分 <strong id="finalScore">0</strong></span>
            <span>🏆 最高 <strong id="finalHigh">0</strong></span>
        </div>
        <button class="restart-btn" id="restartBtn">🔄 再起风云</button>
    </div>
    <!-- 升级面板 -->
    <div class="modal-overlay" id="upgradeModal">
        <div class="modal-box">
            <h2>📈 升级中心 <button class="close-btn" id="modalCloseBtn">✕</button></h2>
            <div id="upgradeContent"></div>
            <div class="total-gold">
                <span class="coin-icon" id="modalCoinIcon"></span>
                <span>当前金币: <span id="modalGold">0</span></span>
            </div>
        </div>
    </div>
    <!-- 图鉴面板 -->
    <div class="modal-overlay" id="bestiaryModal">
        <div class="modal-box">
            <h2>📖 怪物图鉴 & 元素反应 <button class="close-btn" id="bestiaryCloseBtn">✕</button></h2>
            <div id="bestiaryContent"></div>
        </div>
    </div>
    <!-- 设置面板 -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-box">
            <h2>⚙️ 游戏设置 <button class="close-btn" id="settingsCloseBtn">✕</button></h2>
            <div id="settingsContent"></div>
        </div>
    </div>

    <script>
        // ================================================================
        //  永动机的归途是听凭风引 · 游戏 - 最终完整版
        //  包含：全部17角色、血量差异化、Boss移动限制、来古士充能扣血、
        //  多托雷分身0.05倍血量+激光修复、Boss积分20等
        // ================================================================

        // ---------- 配置中心 ----------
        const CONFIG = {
            particles: { max: window.innerWidth < 600 ? 200 : 500 },
            monster: {
                hpBase: 10,
                hpPerWave: 1.5,
                speedBase: 0.2,
                speedCap: 1.8,
                hpMultiplier: {
                    slime: 0.8,
                    axe: 1.3,
                    council: 1.1,
                    bow: 1.0,
                    eroding: 2.0,
                    warlord: 2.0,
                    griffon: 2.0,
                    lykourgos: 1.0,
                    dottore: 1.0,
                }
            },
            upgrades: {
                attack:      { baseCost: 10, costScale: 8, maxLevel: 30 },
                attackSpeed: { baseCost: 10, costScale: 8, maxLevel: 30 },
                health:      { baseCost: 10, costScale: 8, maxLevel: 30 },
                bounce:      { baseCost: 30, costScale: 20, maxLevel: 20 },
                moveSpeed:   { baseCost: 10, costScale: 8, maxLevel: 30 },
                gold:        { baseCost: 10, costScale: 8, maxLevel: 30 },
                skill:       { baseCost: 30, costScale: 15, maxLevel: 20 },
                elementMastery: { baseCost: 20, costScale: 12, maxLevel: 30 },
                energyRecharge: { baseCost: 20, costScale: 12, maxLevel: 30 },
                monsterSpeed: { baseCost: 50, costScale: 30, maxLevel: 20 },
                healthRegen: { baseCost: 15, costScale: 10, maxLevel: 18 },
            },
            reactions: {
                vaporize: { base: 2.0, perLevel: 0.08 },
                melt:     { base: 2.6, perLevel: 0.14 },
                overload: { base: 0.8, perLevel: 0.08 },
                electroCharged: { base: 0.45, perLevel: 0.05 },
                freeze:   { base: 2.5, perLevel: 0.25 },
                superconduct: { base: 0.9, perLevel: 0.06 },
                swirl:    { base: 0.35, perLevel: 0.04 },
            },
            balance: {
                regenBase: 30,
                regenDecay: 0.9,
                regenMin: 5,
                monsterSpeedReduce: 0.04,
                bossHpMultiplier: 20,        // 大幅降低Boss血量
                bossExtraHpPerWave: 80,      // 降低每波额外血量
                eliteHpMultiplier: 1.3,      // 降低精英血量倍率
                eliteSpeedMultiplier: 0.8,
                bossSpeedMultiplier: 0.35,
                lykourgosEmpowerDuration: 600,
                skillEnergyCost: 150,
                maxEnergy: 250,
                energyPerKill: 1,
                energyPerReaction: 5,
            },
            states: {
                PLAYING: 'playing',
                PAUSED: 'paused',
                UPGRADING: 'upgrading',
                BESTIARY: 'bestiary',
                SETTINGS: 'settings',
                GAMEOVER: 'gameover',
            },
        };

        // ---------- 读取首页传递的数据 ----------
        let startData = null;
        try {
            const raw = localStorage.getItem('kaeyaGameStartData');
            if (raw) {
                startData = JSON.parse(raw);
                localStorage.removeItem('kaeyaGameStartData');
            }
        } catch (e) {}

        if (!startData) {
            startData = {
                startWave: 1,
                character: 'eternal',
                autoShoot: false,
                settings: { volume: 80, sensitivity: 1.0, quality: 'high' }
            };
        }

        // ---------- 全局进度 ----------
        const GlobalProgress = {
            diamond: 0,
            maxWave: 1,
            attackLevel: 1,
            attackSpeedLevel: 1,
            healthLevel: 1,
            bounceLevel: 0,
            moveSpeedLevel: 1,
            goldLevel: 1,
            skillLevel: 0,
            elementMasteryLevel: 0,
            energyRechargeLevel: 0,
            monsterSpeedLevel: 0,
            healthRegenLevel: 0,
        };

        const STORAGE_KEY = 'kaeyaWindProgress';

        function loadProgress() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                if (data) {
                    const parsed = JSON.parse(data);
                    Object.assign(GlobalProgress, parsed);
                }
            } catch (e) {}
        }

        function saveProgress() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(GlobalProgress));
            } catch (e) {}
        }

        loadProgress();

        // ---------- 全局统计 ----------
        (function() {
            let storedHigh = parseInt(localStorage.getItem('kaeyaWindHighScore')) || 0;
            window.GameStats = {
                totalGoldEarned: 0,
                highScore: storedHigh,
            };
            window.updateHighScore = function(score) {
                if (game.cheatMode) return;
                if (score > window.GameStats.highScore) {
                    window.GameStats.highScore = score;
                    localStorage.setItem('kaeyaWindHighScore', String(score));
                }
            };
            window.updateMaxWave = function(wave) {
                if (game.cheatMode) return;
                if (wave > GlobalProgress.maxWave) {
                    GlobalProgress.maxWave = wave;
                    saveProgress();
                }
            };
        })();

        // ---------- 台词 ----------
        const SKILL_LINES = ["听凭风引", "朔风起意", "随风而去", "踏风"];

        function randomSkillLine() {
            return SKILL_LINES[Math.floor(Math.random() * SKILL_LINES.length)];
        }

        // ---------- DOM ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const waveDisplay = document.getElementById('waveDisplay');
        const goldDisplay = document.getElementById('goldDisplay');
        const lifeDisplay = document.getElementById('lifeDisplay');
        const killsDisplay = document.getElementById('killsDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const highScoreDisplay = document.getElementById('highScoreDisplay');
        const energyDisplay = document.getElementById('energyDisplay');
        const diamondDisplay = document.getElementById('diamondDisplay');
        const finalWave = document.getElementById('finalWave');
        const finalKills = document.getElementById('finalKills');
        const finalScore = document.getElementById('finalScore');
        const finalHigh = document.getElementById('finalHigh');
        const gameOverlay = document.getElementById('gameOverlay');
        const restartBtn = document.getElementById('restartBtn');
        const upgradeBtn = document.getElementById('upgradeBtn');
        const bestiaryBtn = document.getElementById('bestiaryBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const upgradeModal = document.getElementById('upgradeModal');
        const bestiaryModal = document.getElementById('bestiaryModal');
        const settingsModal = document.getElementById('settingsModal');
        const modalCloseBtn = document.getElementById('modalCloseBtn');
        const bestiaryCloseBtn = document.getElementById('bestiaryCloseBtn');
        const settingsCloseBtn = document.getElementById('settingsCloseBtn');
        const upgradeContent = document.getElementById('upgradeContent');
        const bestiaryContent = document.getElementById('bestiaryContent');
        const settingsContent = document.getElementById('settingsContent');
        const modalGold = document.getElementById('modalGold');
        const bossHealthBar = document.getElementById('bossHealthBar');
        const bossHealthFill = document.getElementById('bossHealthFill');
        const bossHealthLabel = document.getElementById('bossHealthLabel');
        const bossHpText = document.getElementById('bossHpText');
        const coinIconTop = document.getElementById('coinIconTop');
        const diamondIconTop = document.getElementById('diamondIconTop');

        // ---------- 高DPI缩放 ----------
        let dpr = window.devicePixelRatio || 1;
        let W = 900,
            H = 750;
        let scaleX, scaleY, offsetX, offsetY;

        function updateLogicSize() {
            const winW = window.innerWidth;
            const winH = window.innerHeight;
            const ratio = winW / winH;
            let logicW = 900,
                logicH = 750;
            if (ratio > 1.4) {
                logicW = Math.min(1200, logicW * (ratio / 1.4));
            } else if (ratio < 0.8) {
                logicH = Math.min(1000, logicH * (1.4 / ratio));
            }
            W = Math.round(logicW);
            H = Math.round(logicH);
        }

        function resizeCanvas() {
            updateLogicSize();
            const winW = window.innerWidth,
                winH = window.innerHeight;
            canvas.width = winW * dpr;
            canvas.height = winH * dpr;
            canvas.style.width = winW + 'px';
            canvas.style.height = winH + 'px';
            const logicW = W,
                logicH = H;
            const scaleW = canvas.width / logicW,
                scaleH = canvas.height / logicH;
            const scale = Math.min(scaleW, scaleH);
            scaleX = scale;
            scaleY = scale;
            offsetX = (canvas.width - logicW * scale) / 2;
            offsetY = (canvas.height - logicH * scale) / 2;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function toLogic(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const x = (clientX - rect.left) * dpr;
            const y = (clientY - rect.top) * dpr;
            return { x: clamp((x - offsetX) / scaleX, 0, W), y: clamp((y - offsetY) / scaleY, 0, H) };
        }

        function rand(min, max) { return Math.random() * (max - min) + min; }

        function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

        function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

        function angleTo(a, b) { return Math.atan2(b.y - a.y, b.x - a.x); }

        function drawImageWithFallback(ctx, img, x, y, w, h, fallbackDraw) {
            if (img && img.complete && img.naturalWidth > 0) {

        function getMaxLives() {
            return 10 + (game.healthLevel - 1) * 5;

            return 10 + (game.attackLevel - 1) * 5;
        }

        function getCooldownMax() { let cd = 60; for (let i = 1; i < game.attackSpeedLevel; i++) cd *= 0.9; return Math.max(1,
                Math.round(cd)); }

        function getMaxChargeTime() { let t = 120; for (let i = 1; i < game.attackSpeedLevel; i++) t *= 0.9; return Math.max(1,
                Math.round(t)); }

        function getTowerSpeed() { return 3 + (game.moveSpeedLevel - 1) * 0.5; }

        function getGoldBonus() { return (game.goldLevel - 1) * 1; }

        function getElementMasteryBonus() { return 1 + game.elementMasteryLevel * 0.12; }

        function getEnergyRechargeBonus() { return 1 + game.energyRechargeLevel * 0.10; }

        function getSkillDamageMultiplier() { return 2 + (game.skillLevel - 1) * 0.4; }

        function getSkillEyeRadius() { return 250 + (game.skillLevel - 1) * 15; }

        function getSkillEyeDuration() { return 180; }

        function getSkillEyeDamage() {
            const base = getAttack() * getSkillDamageMultiplier();
            return base * 0.6 * (1 + (game.skillLevel - 1) * 0.08);
        }

        function getRegenInterval() {
            const raw = CONFIG.balance.regenBase * Math.pow(CONFIG.balance.regenDecay, game.healthRegenLevel);
            return Math.max(raw, CONFIG.balance.regenMin);
        }

        function getMonsterSpeedMultiplier() {
            return Math.pow(1 - CONFIG.balance.monsterSpeedReduce, Math.min(game.monsterSpeedLevel, 20));
        }

        function getUpgradeCost(type) {
            const cfg = CONFIG.upgrades[type];
            if (!cfg) return 99999;
            const base = cfg.baseCost;
            const scale = cfg.costScale;
            let level = 0;
            switch (type) {
                case 'attack': level = game.attackLevel; break;
                case 'attackSpeed': level = game.attackSpeedLevel; break;
                case 'health': level = game.healthLevel; break;
                case 'bounce': level = game.bounceLevel; break;
                case 'moveSpeed': level = game.moveSpeedLevel; break;
                case 'gold': level = game.goldLevel; break;
                case 'skill': level = game.skillLevel; break;
                case 'elementMastery': level = game.elementMasteryLevel; break;
                case 'energyRecharge': level = game.energyRechargeLevel; break;
                case 'monsterSpeed': level = game.monsterSpeedLevel; break;
                case 'healthRegen': level = game.healthRegenLevel; break;
                default: return 99999;
            }
            return Math.floor(base + Math.pow(level, 1.8) * scale);
        }

                return;

            // 处理来古士充能大招（扣血5）
            if (game.lykourgosEmpowerActive) {
                game.lykourgosEmpowerActive = false;
                spawnFloatingText(W / 2, H / 2 - 60, '⚡ 强化释放！', '#ffd700', 32);

                if (game.lives < 0) game.lives = 0;
                updateUI();
                if (game.lives <= 0) { gameOver(); return; }
            } else {
                // 正常释放消耗150能量
                game.energy = Math.max(0, game.energy - CONFIG.balance.skillEnergyCost);
                game.skillReady = false;
                if (game.energy >= CONFIG.balance.skillEnergyCost) {

        // ================================================================
        //  怪物血量计算（差异化）
        // ================================================================
        function getMonsterHP(wave, type, isElite, isBoss) {
            const base = CONFIG.monster.hpBase;
            const perWave = CONFIG.monster.hpPerWave;
            let hp = base + Math.pow(wave, 1.5) * perWave;
            const mult = CONFIG.monster.hpMultiplier[type] || 1.0;
            hp *= mult;
            if (isElite) hp *= CONFIG.balance.eliteHpMultiplier;
            if (isBoss) {
                hp *= CONFIG.balance.bossHpMultiplier;
                hp += wave * CONFIG.balance.bossExtraHpPerWave;
            }
            return Math.floor(hp);
        }

        function createMonster(type, wave, baseHp, isElite = false, isBoss = false, spriteOverride = null) {
            let hp = getMonsterHP(wave, type, isElite, isBoss);
            if (baseHp !== undefined && baseHp !== null) hp = baseHp;

            const x = rand(40, W - 40);
            const y = rand(-30, -10);
            let speedMult = 1;
            if (isElite) speedMult = CONFIG.balance.eliteSpeedMultiplier;
            if (isBoss) speedMult = CONFIG.balance.bossSpeedMultiplier;
            if (type === 'bow') speedMult = 0.8;
            const speedFactor = getMonsterSpeedMultiplier();
            const baseSpeed = CONFIG.monster.speedBase * speedMult * speedFactor + wave * 0.008;
            const radius = isBoss ? 44 : (isElite ? 30 : (18 + (wave % 3) * 1.2));
            const colorMap = {
                slime: '#4ecdc4',
                axe: '#e67e22',
                council: '#a29bfe',
                bow: '#f39c12',
                eroding: '#6c5ce7',
                warlord: '#e17055',
                griffon: '#fdcb6e',
                lykourgos: '#95a5a6',
                dottore: '#6c5ce7',
            };
            const moveAngle = rand(0, Math.PI * 2);
            const obj = {
                type: type,
                x,
                y,
                radius,
                speed: Math.min(baseSpeed, CONFIG.monster.speedCap),
                hp: hp,
                maxHp: hp,
                color: colorMap[type] || '#74b9ff',
                hitFlash: 0,
                isDead: false,
                isElite: isElite,
                isBoss: isBoss,
                wobble: rand(0, Math.PI * 2),
                wobbleSpeed: rand(0.008, 0.025),
                wobbleAmp: rand(0.2, 0.8),
                element: null,
                frozen: 0,
                baseSpeed: Math.min(baseSpeed, CONFIG.monster.speedCap),
                timer: 0,
                state: 'idle',
                summonTimer: 0,
                bulletTimer: 0,
                buffTarget: null,
                buffTimer: 0,
                form: 'white',
                cloneTimer: 0,
                laserTimer: 0,
                clones: [],
                _buff: false,
                _vulnerable: false,
                spriteKey: spriteOverride || type,
                moveAngle: moveAngle,
                moveTimer: 0,
                _blinkTimer: 0,
                _shadowTimer: 0,
                _origX: x,
                _origY: y,
                _returning: false,
                _returnProgress: 0,
                _inSkill: false,
                _jumpTimer: 0,
                _jumpPower: 0,
                _aggroRange: 400,
                _wanderAngle: rand(0, Math.PI * 2),
            };
            if (type === 'council') obj.bulletTimer = randInt(60, 120);
            if (type === 'bow') obj.bulletTimer = randInt(120, 180);
            if (type === 'warlord') obj.buffTimer = 480;
            if (type === 'griffon') { obj.summonTimer = 0;
                obj.bulletTimer = 0; }
            if (type === 'lykourgos') { obj.form = 'white'; }
            if (type === 'dottore') {
                obj.cloneTimer = 0;
                obj.laserTimer = 0;
                obj.clones = [];
            }
            return obj;
        }

        // ---------- 波次管理 ----------
        function getWaveMonsterCount(wave) {
            const hp = getMonsterHP(wave, 'slime', false, false);
            let count = Math.floor(wave / hp) + 2;
            count = Math.max(3, count);
            return { count, hp };
        }

        function getEliteCount(wave) {
            if (wave < 8) return 0;
            if (wave < 20) return 1;
            if (wave < 35) return 2;
            return 3;
        }

        function isBossWave(wave) { return wave % 10 === 0 && wave > 0; }

        function startWave() {
            if (game.isOver) return;
            game.waveActive = true;
            const { count } = getWaveMonsterCount(game.wave);
            game.monstersInWave = count;
            game.monstersSpawned = 0;
            for (let i = 0; i < game.monstersInWave; i++) {
                let type = 'slime';
                const r = rand(0, 1);
                if (r < 0.25) type = 'slime';
                else if (r < 0.50) type = 'axe';
                else if (r < 0.75) type = 'council';
                else type = 'bow';
                const m = createMonster(type, game.wave, undefined, false, false);
                monsters.push(m);
                game.monstersSpawned++;
                spawnParticles(m.x, m.y + 10, '#ffffff', 3);
            }
            if (isBossWave(game.wave)) {
                const bossType = Math.random() < 0.5 ? 'lykourgos' : 'dottore';
                const boss = createMonster(bossType, game.wave, undefined, true, true);
                monsters.push(boss);
                spawnFloatingText(boss.x, boss.y - 30, '👑 BOSS登场！', '#ff4444', 32);
                showBossHealthBar(boss);
                game.lykourgosEmpowerTriggered = false;
                game.lykourgosEmpowerActive = false;
            } else {
                const eliteCount = getEliteCount(game.wave);
                const eliteTypes = ['eroding', 'warlord', 'griffon'];
                for (let i = 0; i < eliteCount; i++) {
                    const type = eliteTypes[randInt(0, eliteTypes.length - 1)];
                    const elite = createMonster(type, game.wave, undefined, true, false);
                    monsters.push(elite);
                    spawnFloatingText(elite.x, elite.y - 30, '💀 精英怪！', '#ff8800', 26);
                }
                hideBossHealthBar();
            }
            spawnFloatingText(W / 2, 50, `🌊 第 ${game.wave} 波 (${game.monstersInWave}只)`, '#a29bfe', 22);
            updateUI();
        }

        // ---------- Boss血条 ----------

        function showBossHealthBar(boss) {
            currentBoss = boss;

        function hideBossHealthBar() {
            currentBoss = null;
            bossHealthBar.style.display = 'none';

        function updateBossHealthBar() {
            if (!currentBoss || currentBoss.isDead) {
                hideBossHealthBar();
                return;
            }
            const pct = Math.max(0, (currentBoss.hp / currentBoss.maxHp) * 100);
            bossHealthFill.style.width = pct + '%';
            bossHpText.textContent = Math.floor(pct) + '%';
            const nameMap = {
                lykourgos: '⚫ 来古士',
                dottore: '🧪 多托雷'
            };
            const label = document.getElementById('bossHealthLabel');
            const name = nameMap[currentBoss.type] || '👑 BOSS';
            label.innerHTML = name + ' <span class="hp-text" id="bossHpText">' + Math.floor(pct) + '%</span>';
        }

        // ---------- 掉落物 ----------
        function dropGold(x, y, amount) {
            if (!isFinite(x) || !isFinite(y)) {
                game.gold += amount;
                window.GameStats.totalGoldEarned += amount;
                spawnFloatingText(W/2, H/2 - 20, `+${amount} 🪙 (屏幕外)`, '#f9ca24', 20);
                updateUI();
                updateModalGold();
                return;
            }
            if (x < 0 || x > W || y < 0 || y > H) {
                game.gold += amount;
                window.GameStats.totalGoldEarned += amount;
                spawnFloatingText(W/2, H/2 - 20, `+${amount} 🪙 (屏幕外)`, '#f9ca24', 20);
                updateUI();
                updateModalGold();
                return;
            }
            goldDrops.push({
                x: x,
                y: y,
                amount: amount,
                radius: 15,
                timer: 0,
                bob: rand(0, Math.PI * 2),
            });
        }

        function dropDiamond(x, y, amount) {
            if (!isFinite(x) || !isFinite(y) || x < 0 || x > W || y < 0 || y > H) {
                GlobalProgress.diamond += amount;
                saveProgress();
                spawnFloatingText(W/2, H/2 - 20, `+${amount} 💎 (屏幕外)`, '#00d2d3', 20);
                updateUI();
                return;
            }
            diamondDrops.push({
                x: x,
                y: y,
                amount: amount,
                radius: 12,
                timer: 0,
                bob: rand(0, Math.PI * 2),
            });
        }

        function dropHealthPack(x, y) {
            if (!isFinite(x) || !isFinite(y) || x < 0 || x > W || y < 0 || y > H) return;
            healthPacks.push({
                x: x,
                y: y,
                radius: 10,
                timer: 0,
                bob: rand(0, Math.PI * 2),
            });
        }

        function updateDrops() {
            for (let i = goldDrops.length - 1; i >= 0; i--) {
                const d = goldDrops[i];
                if (!d || !isFinite(d.x) || !isFinite(d.y)) { goldDrops.splice(i, 1); continue; }
                d.timer++;
                d.bob += 0.05;
                if (dist({ x: game.towerX, y: game.towerY }, d) < 40) {
                    game.gold += d.amount;
                    window.GameStats.totalGoldEarned += d.amount;
                    spawnFloatingText(d.x, d.y - 20, `+${d.amount} 🪙`, '#f9ca24', 20);
                    goldDrops.splice(i, 1);
                    updateUI();
                    updateModalGold();
                }
            }
            for (let i = diamondDrops.length - 1; i >= 0; i--) {
                const d = diamondDrops[i];
                if (!d || !isFinite(d.x) || !isFinite(d.y)) { diamondDrops.splice(i, 1); continue; }
                d.timer++;
                d.bob += 0.05;
                if (dist({ x: game.towerX, y: game.towerY }, d) < 40) {
                    GlobalProgress.diamond += d.amount;
                    saveProgress();
                    spawnFloatingText(d.x, d.y - 20, `+${d.amount} 💎`, '#00d2d3', 20);
                    diamondDrops.splice(i, 1);
                    updateUI();
                }
            }
            for (let i = healthPacks.length - 1; i >= 0; i--) {
                const d = healthPacks[i];
                if (!d || !isFinite(d.x) || !isFinite(d.y)) { healthPacks.splice(i, 1); continue; }
                d.timer++;
                d.bob += 0.05;
                if (dist({ x: game.towerX, y: game.towerY }, d) < 40) {
                    if (game.lives < game.maxLives) {
                        game.lives++;
                        spawnFloatingText(d.x, d.y - 20, `+1 ❤️`, '#ff6b6b', 20);
                    } else {
                        spawnFloatingText(d.x, d.y - 20, `❤️ 已满`, '#aaa', 16);
                    }
                    healthPacks.splice(i, 1);
                    updateUI();
                }
            }
        }

        // ---------- 风眼 ----------
        function createEye(x, y) {
            if (game.skillActive) {
                endEye();
            }
            const radius = getSkillEyeRadius();
            const duration = getSkillEyeDuration();
            const damagePerTick = getSkillEyeDamage();
            game.skillActive = true;
            game.skillEye = {
                x: x,
                y: y,
                radius: radius,
                timer: 0,
                duration: duration,
                damagePerTick: damagePerTick,
                affectedMonsters: [],
            };
            for (const m of monsters) {
                if (m.isDead) continue;
                if (m.isBoss) continue;
                if (dist({x, y}, m) < radius) {
                    game.skillEye.affectedMonsters.push({
                        monster: m,
                        origX: m.x,
                        origY: m.y,
                    });
                }
            }
            spawnParticles(x, y, '#00d2d3', 30, [3, 6], [30, 50]);
            spawnFloatingText(x, y - 50, '🌀 风眼', '#00d2d3', 28);
        }

        function updateEye() {
            if (!game.skillActive || !game.skillEye) return;
            const eye = game.skillEye;
            eye.timer++;
            const radius = eye.radius;
            const damage = eye.damagePerTick;

            for (const m of monsters) {
                if (m.isDead) continue;
                if (m.isBoss) continue;
                const d = dist(eye, m);
                if (d < radius) {
                    const force = (1 - d / radius) * 0.6;
                    const angle = angleTo(m, eye);
                    m.x += Math.cos(angle) * force;
                    m.y += Math.sin(angle) * force;
                    if (!eye.affectedMonsters.some(r => r.monster === m)) {
                        eye.affectedMonsters.push({
                            monster: m,
                            origX: m.x,
                            origY: m.y,
                        });
                    }
                }
            }

            if (eye.timer % 60 === 0) {
                for (const m of monsters) {
                    if (m.isDead) continue;
                    if (m.isBoss) continue;
                    if (dist(eye, m) < radius) {
                        m.hp -= damage;
                        m.hitFlash = 8;
                        spawnParticles(m.x, m.y, '#00d2d3', 4);
                        spawnFloatingText(m.x, m.y - 20, `-${Math.floor(damage)}`, '#00d2d3', 16);
                        if (m.hp <= 0) {
                            killMonster(m, monsters.indexOf(m));
                        }
                    }
                }
            }

            if (eye.timer % 3 === 0) {
                for (let i = 0; i < 6; i++) {
                    const angle = rand(0, Math.PI * 2);
                    const r = rand(10, radius * 0.9);
                    particles.push({
                        x: eye.x + Math.cos(angle) * r,
                        y: eye.y + Math.sin(angle) * r,
                        vx: Math.cos(angle + eye.timer * 0.02) * (0.2 + (1 - r / radius) * 0.3),
                        vy: Math.sin(angle + eye.timer * 0.02) * (0.2 + (1 - r / radius) * 0.3),
                        life: rand(10, 20),
                        maxLife: 20,
                        radius: rand(1.5, 3.5),
                        color: `hsla(190, 80%, 70%, 0.3)`,
                        decay: 0.97,
                    });
                }
            }

            if (eye.timer >= eye.duration) {
                endEye();
            }
        }

        function endEye() {
            if (!game.skillActive) return;
            const eye = game.skillEye;
            for (const record of eye.affectedMonsters) {
                const m = record.monster;
                if (m.isDead) continue;
                m._returning = true;
                m._returnProgress = 0;
                m._origX = record.origX;
                m._origY = record.origY;
            }
            game.skillActive = false;
            game.skillEye = null;
            const line = randomSkillLine();
            spawnFloatingText(eye.x, eye.y - 60, `🌀 ${line}`, '#00d2d3', 28);
        }

        // ---------- 蚀魔光环 ----------
        function getErodingAuraEffect(px, py) {
            for (const m of monsters) {
                if (m.isDead) continue;
                if (m.type === 'eroding') {
                    if (dist({x: px, y: py}, m) < 200) {
                        return { inAura: true, monsterSpeedBoost: 1.3, bulletSpeedReduce: 0.8 };
                    }
                }
            }
            return { inAura: false };
        }

        // ---------- 怪物AI ----------
        function updateMonsters() {
            const bottomLine = H - 25;
            for (let i = monsters.length - 1; i >= 0; i--) {
                const m = monsters[i];
                if (m.isDead) continue;

                if (m._returning) {
                    m._returnProgress += 0.01 * (m.speed / 0.3);
                    if (m._returnProgress >= 1) {
                        m._returning = false;
                        m.x = m._origX;
                        m.y = m._origY;
                        m._returnProgress = 0;
                    } else {
                        m.x = m._origX * m._returnProgress + m.x * (1 - m._returnProgress);
                        m.y = m._origY * m._returnProgress + m.y * (1 - m._returnProgress);
                        continue;
                    }
                }

                if (m.frozen > 0) { 
                    m.frozen--; 
                } else {
                    let speedMul = 1;
                    const aura = getErodingAuraEffect(m.x, m.y);
                    if (aura.inAura) {
                        speedMul = aura.monsterSpeedBoost;
                    }

                    // ====== Boss移动逻辑（限制Y坐标，防止触底） ======
                    if (m.isBoss) {
                        m.moveTimer = (m.moveTimer || 0) + 1;
                        if (m.moveTimer % 10 === 0) {
                            m.moveAngle += rand(-0.2, 0.2);
                        }
                        const bossMaxY = H * 0.5;  // Boss最高只能到屏幕一半
                        m.x += Math.cos(m.moveAngle) * m.speed * 0.6 * speedMul;
                        m.y += Math.sin(m.moveAngle) * m.speed * 0.6 * speedMul;
                        if (m.x < m.radius) { m.x = m.radius; m.moveAngle = Math.PI - m.moveAngle; }
                        if (m.x > W - m.radius) { m.x = W - m.radius; m.moveAngle = Math.PI - m.moveAngle; }
                        if (m.y < m.radius) { m.y = m.radius; m.moveAngle = -m.moveAngle; }
                        if (m.y > bossMaxY) {
                            m.y = bossMaxY;
                            m.moveAngle = -m.moveAngle + rand(-0.2, 0.2);
                        }
                    } else {
                        // 普通怪物移动
                        m.moveTimer = (m.moveTimer || 0) + 1;
                        if (m.moveTimer % 120 === 0) {
                            m.moveAngle = rand(0, Math.PI * 2);
                        }
                        m.x += Math.cos(m.moveAngle) * m.speed * 0.2 * speedMul;
                        m.y += m.speed * 0.8 * speedMul + Math.sin(m.moveAngle) * m.speed * 0.2 * speedMul;
                        if (m.x < m.radius) { m.x = m.radius; m.moveAngle = -m.moveAngle; }
                        if (m.x > W - m.radius) { m.x = W - m.radius; m.moveAngle = Math.PI - m.moveAngle; }
                    }
                }

                if (m.isElite || m.isBoss) {
                    updateEliteAI(m);
                } else {
                    updateNormalAI(m);
                }

                // 触底伤害（但Boss不会触底）
                if (m.y + m.radius >= bottomLine) {
                    let dmg = 1;
                    if (m.isBoss) dmg = 5;
                    else if (m.isElite) dmg = 3;
                    game.lives -= dmg;
                    spawnParticles(m.x, bottomLine, '#ff6b6b', 10);
                    spawnFloatingText(m.x, bottomLine - 30, `💔 -${dmg}`, '#ff6b6b', 24);
                    m.isDead = true;
                    monsters.splice(i, 1);
                    updateUI();
                    if (game.lives <= 0) { gameOver(); return; }
                    continue;
                }

                if (dist(m, { x: game.towerX, y: game.towerY }) < m.radius + 16) {
                    let dmg = 1;
                    if (m.isBoss) dmg = 5;
                    else if (m.isElite) dmg = 3;
                    game.lives -= dmg;
                    spawnParticles(game.towerX, game.towerY, '#ff6b6b', 10);
                    spawnFloatingText(game.towerX, game.towerY - 30, `💔 -${dmg}`, '#ff6b6b', 24);
                    m.isDead = true;
                    monsters.splice(i, 1);
                    updateUI();
                    if (game.lives <= 0) { gameOver(); return; }
                    continue;
                }

                if (m.hitFlash > 0) m.hitFlash--;
            }
        }

        function updateNormalAI(m) {
            if (m.frozen > 0) return;

            if (m.type === 'axe') {
                // 爆炸在死亡时处理
            } else if (m.type === 'council') {
                m.bulletTimer--;
                if (m.bulletTimer <= 0) {
                    const baseAngle = angleTo(m, { x: game.towerX, y: game.towerY });
                    for (let i = -1; i <= 1; i += 2) {
                        const angle = baseAngle + i * 0.15;
                        const speed = 1.6;
                        enemyBullets.push({
                            x: m.x,
                            y: m.y,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed,
                            radius: 7,
                            isDead: false,
                            color: '#aa88ff',
                            damage: 1
                        });
                    }
                    m.bulletTimer = randInt(60, 120);
                }
                if (m.hitFlash > 0 && Math.random() < 0.1) {
                    let newX, newY;
                    let attempts = 0;
                    const maxAttempts = 20;
                    do {
                        const angle = rand(0, Math.PI * 2);
                        const distOffset = rand(150, 250);
                        newX = m.x + Math.cos(angle) * distOffset;
                        newY = m.y + Math.sin(angle) * distOffset;
                        attempts++;
                    } while ((Math.hypot(newX - game.towerX, newY - game.towerY) < 80 || newY + m.radius > H - 20) &&
                        attempts < maxAttempts);
                    if (attempts < maxAttempts) {
                        m.x = clamp(newX, 30, W - 30);
                        m.y = clamp(newY, 30, H - 30);
                        spawnParticles(m.x, m.y, '#aa88ff', 10);
                        spawnParticles(m.x, m.y, '#88ccff', 6);
                        m._shadowTimer = 30;
                    }
                }
                if (m._blinkTimer > 0) m._blinkTimer--;
                if (m._shadowTimer > 0) m._shadowTimer--;
            } else if (m.type === 'bow') {
                m.bulletTimer--;
                if (m.bulletTimer <= 0) {
                    const angle = angleTo(m, { x: game.towerX, y: game.towerY });
                    const speed = 2.2;
                    enemyBullets.push({ x: m.x, y: m.y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, radius: 6,
                        isDead: false, color: '#f39c12', damage: 1 });
                    m.bulletTimer = randInt(120, 180);
                }
            }
        }

        function updateEliteAI(m) {
            if (m.frozen > 0) return;

            m.timer = (m.timer || 0) + 1;

            if (m.type === 'eroding') {
                if (m.timer % 10 === 0) {
                    spawnParticles(m.x, m.y, '#9b59b6', 3, [0.5, 1.5], [15, 25]);
                }
                return;
            }

            // 来古士
            if (m.type === 'lykourgos') {
                const hpRatio = m.hp / m.maxHp;

                if (hpRatio > 0.5) {
                    if (m.form !== 'white') {
                        m.form = 'white';
                        spawnFloatingText(m.x, m.y - 40, '⚪ 白形态', '#ffffff', 28);
                        m.timer = 0;
                    }
                    if (m.timer % 240 === 0) {
                        const hpBonus = 5 + game.wave * 1.5;
                        const minion = createMonster('bow', game.wave, undefined, false, false);
                        minion.x = m.x + rand(-80, 80);
                        minion.y = m.y + 20;
                        monsters.push(minion);
                        spawnFloatingText(m.x, m.y - 20, '🪄 召唤弓箭手', '#88ff88', 20);
                    }
                } else {
                    if (m.form !== 'black') {
                        m.form = 'black';
                        spawnFloatingText(m.x, m.y - 40, '⚫ 黑形态', '#000000', 28);
                        m.timer = 0;
                        m._shadowTimer = 30;

                        if (!game.lykourgosEmpowerTriggered && !game.isOver && !game.paused) {
                            game.lykourgosEmpowerTriggered = true;
                            game.lykourgosEmpowerOriginalEnergy = game.energy;
                            game.energy = game.maxEnergy;
                            game.skillReady = true;
                            game.lykourgosEmpowerActive = true;
                            game.lykourgosEmpowerTimer = 0;

                            spawnFloatingText(W / 2, H / 2 - 80, '⚡ 来古士能量灌注！', '#ffd700', 40);
                            spawnFloatingText(W / 2, H / 2 - 40, '⏳ 10秒内免费释放大招（扣5血）', '#ffd93d', 28);
                            toast = {
                                text: '⚡ 充能！10秒内开大（扣5血）',
                                timer: 0,
                                maxTimer: 120,
                                alpha: 1
                            };
                        }
                    }

                    if (m.timer % 180 === 0) {
                        const angle = angleTo(m, { x: game.towerX, y: game.towerY });
                        const speed = 3.5;
                        enemyBullets.push({
                            x: m.x,
                            y: m.y,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed,
                            radius: 15,
                            isDead: false,
                            color: '#8e44ad',
                            damage: 4,
                            isShadowWave: true,
                        });
                        spawnFloatingText(m.x, m.y - 30, '🌊 暗影波', '#8e44ad', 20);
                    }
                    if (m.timer % 480 === 0) {
                        const angle2 = rand(0, Math.PI * 2);
                        const dist2 = rand(100, 250);
                        const sx = m.x + Math.cos(angle2) * dist2;
                        const sy = m.y + Math.sin(angle2) * dist2;
                        enemyBullets.push({
                            x: clamp(sx, 30, W - 30),
                            y: clamp(sy, 30, H - 30),
                            radius: 30,
                            isDead: false,
                            color: 'rgba(142, 68, 173, 0.6)',
                            isShadowBall: true,
                            timer: 0,
                            duration: 360,
                            damage: 3,
                        });
                        spawnFloatingText(enemyBullets[enemyBullets.length-1].x, enemyBullets[enemyBullets.length-1].y - 20, '⚫ 暗影球', '#8e44ad', 20);
                    }
                    if (hpRatio < 0.3) {
                        m.speed = m.baseSpeed * 1.2;
                    }
                }
                return;
            }

            // 多托雷本体
            if (m.type === 'dottore' && !m.isClone) {
                m.cloneTimer = (m.cloneTimer || 0) - 1;
                if (m.cloneTimer <= 0 && m.clones.length < 3) {
                    // ====== 分身血量改为本体最大HP的5% ======
                    const cloneHp = Math.floor(m.maxHp * 0.05);
                    const clone = createMonster('dottore', game.wave, cloneHp, false, false, 'dottore');
                    clone.x = m.x + rand(-80, 80);
                    clone.y = m.y + 20;
                    clone.radius = 20;
                    clone.color = '#aa88ff';
                    clone.isClone = true;
                    clone.laserTimer = 0;
                    m.clones.push(clone);
                    monsters.push(clone);
                    m.cloneTimer = 480;
                    spawnFloatingText(m.x, m.y - 20, '🧪 分身（0.05倍血量）', '#aa88ff', 20);
                }

                // 本体激光（伤害3）
                m.laserTimer = (m.laserTimer || 0) - 1;
                if (m.laserTimer <= 0) {
                    const angle = angleTo(m, { x: game.towerX, y: game.towerY });
                    spawnFloatingText(m.x, m.y - 50, '🔴 激光蓄力', '#ff0000', 22);
                    game.laserEffects.push({
                        x: m.x,
                        y: m.y,
                        angle: angle,
                        phase: 'charging',
                        timer: 0,
                        duration: 48,
                    });
                    setTimeout(() => {
                        const len = 800;
                        const endX = m.x + Math.cos(angle) * len;
                        const endY = m.y + Math.sin(angle) * len;
                        const px = game.towerX,
                            py = game.towerY;
                        const d = distToSegment(px, py, m.x, m.y, endX, endY);
                        if (d < 20) {
                            game.lives -= 3;
                            spawnFloatingText(game.towerX, game.towerY - 40, '💥 激光 -3', '#ff0000', 30);
                            updateUI();
                            if (game.lives <= 0) { gameOver(); return; }
                        }
                        for (let i = 0; i < 40; i++) {
                            const t = rand(0, 1);
                            const x = m.x + Math.cos(angle) * t * len;
                            const y = m.y + Math.sin(angle) * t * len;
                            spawnParticles(x, y, '#ff0000', 3, [1, 3], [10, 20]);
                        }
                        game.laserEffects.push({
                            x: m.x,
                            y: m.y,
                            angle: angle,
                            phase: 'firing',
                            timer: 0,
                            duration: 30,
                        });
                    }, 800);
                    m.laserTimer = 480;
                }
                return;
            }

            // 多托雷分身（激光伤害1，已修复）
            if (m.type === 'dottore' && m.isClone) {
                if (m.laserTimer === undefined) m.laserTimer = 0;
                m.laserTimer--;
                if (m.laserTimer <= 0) {
                    const angle = angleTo(m, { x: game.towerX, y: game.towerY });
                    spawnFloatingText(m.x, m.y - 50, '🔴 激光蓄力 (分身)', '#ff6666', 18);
                    game.laserEffects.push({
                        x: m.x,
                        y: m.y,
                        angle: angle,
                        phase: 'charging',
                        timer: 0,
                        duration: 48,
                        isClone: true,
                    });
                    setTimeout(() => {
                        const len = 800;
                        const endX = m.x + Math.cos(angle) * len;
                        const endY = m.y + Math.sin(angle) * len;
                        const px = game.towerX,
                            py = game.towerY;
                        const d = distToSegment(px, py, m.x, m.y, endX, endY);
                        if (d < 20) {
                            game.lives -= 1;
                            spawnFloatingText(game.towerX, game.towerY - 40, '💥 激光 -1', '#ff6666', 24);
                            updateUI();
                            if (game.lives <= 0) { gameOver(); return; }
                        }
                        for (let i = 0; i < 20; i++) {
                            const t = rand(0, 1);
                            const x = m.x + Math.cos(angle) * t * len;
                            const y = m.y + Math.sin(angle) * t * len;
                            spawnParticles(x, y, '#ff6666', 3, [1, 3], [10, 20]);
                        }
                        game.laserEffects.push({
                            x: m.x,
                            y: m.y,
                            angle: angle,
                            phase: 'firing',
                            timer: 0,
                            duration: 30,
                            isClone: true,
                        });
                    }, 800);
                    m.laserTimer = 480;
                }
                return;
            }

            // 其他精英
            if (m.type === 'warlord') {
                m.buffTimer--;
                if (m.buffTimer <= 0) {
                    let best = null;
                    let bestDist = Infinity;
                    for (const other of monsters) {
                        if (other.isDead || other === m) continue;
                        if (other.isElite) continue;
                        const d = dist(m, other);
                        if (d < bestDist) { bestDist = d;
                            best = other; }
                    }
                    if (!best) best = m;
                    if (m.buffTarget && !m.buffTarget.isDead) {
                        m.buffTarget.radius /= 1.5;
                        m.buffTarget.speed /= 1.5;
                        m.buffTarget._buff = false;
                    }
                    m.buffTarget = best;
                    best.radius *= 1.5;
                    best.speed *= 1.5;
                    best._buff = true;
                    spawnFloatingText(best.x, best.y - 20, '💪 强化', '#ffaa00', 20);
                    m.buffTimer = 480;
                }
                return;
            }

            if (m.type === 'griffon') {
                m.summonTimer--;
                if (m.summonTimer <= 0) {
                    const hpBonus = 5 + game.wave * 1.5;
                    const minion = createMonster('bow', game.wave, undefined, false, false);
                    minion.x = m.x + rand(-50, 50);
                    minion.y = m.y + 20;
                    monsters.push(minion);
                    m.summonTimer = 600;
                    spawnFloatingText(m.x, m.y - 20, '🪄 召唤朽弓', '#88ff88', 20);
                }
                m.bulletTimer--;
                if (m.bulletTimer <= 0) {
                    const baseAngle = angleTo(m, { x: game.towerX, y: game.towerY });
                    for (let i = -1; i <= 1; i++) {
                        const angle = baseAngle + i * 0.25;
                        const speed = 2.5;
                        enemyBullets.push({ x: m.x, y: m.y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                            radius: 6, isDead: false, color: '#ffaa44', damage: 1 });
                    }
                    m.bulletTimer = 240;
                }
                return;
            }
        }

        function updateLaserEffects() {
            for (let i = game.laserEffects.length - 1; i >= 0; i--) {
                const eff = game.laserEffects[i];
                eff.timer++;
                if (eff.timer > eff.duration) {
                    game.laserEffects.splice(i, 1);
                }
            }
        }

        function distToSegment(px, py, x1, y1, x2, y2) {
            const dx = x2 - x1,
                dy = y2 - y1;
            const t = clamp(((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy), 0, 1);
            const nearX = x1 + t * dx,
                nearY = y1 + t * dy;
            return Math.hypot(px - nearX, py - nearY);
        }

        // ---------- 自爆特效 ----------
        function explodeAxe(m) {
            const explRadius = 180;
            spawnParticles(m.x, m.y, '#ff8800', 30, [3, 7], [25, 50]);
            spawnParticles(m.x, m.y, '#ff4400', 20, [2, 6], [20, 40]);
            for (let i = 0; i < 12; i++) {
                const angle = rand(0, Math.PI * 2);
                const dist = rand(30, explRadius);
                particles.push({
                    x: m.x + Math.cos(angle) * dist,
                    y: m.y + Math.sin(angle) * dist,
                    vx: Math.cos(angle) * (2 + rand(0, 3)),
                    vy: Math.sin(angle) * (2 + rand(0, 3)) - 0.5,
                    life: rand(10, 25),
                    maxLife: 25,
                    radius: rand(4, 10),
                    color: `hsla(30, 100%, ${rand(50, 80)}%, 0.8)`,
                    decay: 0.94,
                });
            }
            spawnFloatingText(m.x, m.y - 50, '💥 爆炸！', '#ff8800', 34);
        }

        // ---------- 击杀怪物 ----------
        function killMonster(m, index) {
            if (m.isDead) return;
            m.isDead = true;
            if (m.isBoss) {
                hideBossHealthBar();
                if (m.type === 'lykourgos') {
                    game.lykourgosEmpowerActive = false;
                }
            }
            if (m.type === 'axe') {
                explodeAxe(m);
                const explRadius = 150;
                for (const other of monsters) {
                    if (other === m || other.isDead) continue;
                    if (dist(m, other) < explRadius) {
                        other.hp -= 5;
                        other.hitFlash = 8;
                        spawnParticles(other.x, other.y, '#ff8800', 4);
                        if (other.hp <= 0) killMonster(other, monsters.indexOf(other));
                    }
                }
                if (dist(m, { x: game.towerX, y: game.towerY }) < explRadius) {
                    game.lives -= 1;
                    spawnFloatingText(game.towerX, game.towerY - 30, '💥 爆炸 -1', '#ff8800', 24);
                    updateUI();
                    if (game.lives <= 0) { gameOver(); return; }
                }
            }
            game.kills++;
            // ====== Boss 积分改为 20 分 ======
            let scoreAdd = 1;
            if (m.isBoss) scoreAdd = 20;
            else if (m.isElite) scoreAdd = 3;
            if (!game.cheatMode) {
                game.score += scoreAdd;
                window.updateHighScore(game.score);
            }
            const baseReward = m.isBoss ? 10 : (m.isElite ? 5 : (1 + Math.floor(game.wave / 5)));
            const bonus = getGoldBonus();
            const totalReward = baseReward + bonus;
            dropGold(m.x, m.y, totalReward);
            if (Math.random() < 0.02) {
                const amount = randInt(1, 5);
                dropDiamond(m.x, m.y, amount);
            }
            if (Math.random() < 0.01) {
                dropHealthPack(m.x, m.y);
            }
            spawnParticles(m.x, m.y, m.color, 12);
            spawnMapleLeaf(m.x, m.y, '#e67e22');
            let dmgColor = '#ffd93d';
            if (m.isBoss) dmgColor = '#ff4444';
            else if (m.isElite) dmgColor = '#ff8800';
            if (!(m.x < 0 || m.x > W || m.y < 0 || m.y > H)) {
                spawnFloatingText(m.x, m.y - 40, `+${totalReward} 🪙 (基础${baseReward}+加成${bonus})`, dmgColor, 16);
            }
            const idx = monsters.indexOf(m);
            if (idx > -1) monsters.splice(idx, 1);

            // 击杀获得能量
            addEnergy(CONFIG.balance.energyPerKill);

            updateUI();
        }

        // ---------- 元素反应 ----------
        function triggerReaction(bullet, monster) {
            if (bullet.isPhysical) return false;
            const newElem = bullet.type;
            const curElem = monster.element;
            const mastery = getElementMasteryBonus();

            if (newElem === 'wind') {
                if (curElem) {
                    const spreadDmg = bullet.damage * (0.35 + 0.04 * game.elementMasteryLevel) * mastery;
                    const radius = 180;
                    for (const other of monsters) {
                        if (other === monster || other.isDead) continue;
                        if (dist(monster, other) < radius) {
                            if (!other.element) other.element = curElem;
                            other.hp -= spreadDmg;
                            other.hitFlash = 8;
                            spawnParticles(other.x, other.y, '#a29bfe', 6);
                            spawnFloatingText(other.x, other.y - 20, `-${Math.floor(spreadDmg)}`, '#a29bfe', 14);
                            if (other.hp <= 0) killMonster(other, monsters.indexOf(other));
                        }
                    }
                    spawnFloatingText(monster.x, monster.y - 50, '🌪️ 扩散', '#a29bfe', 26);
                    addEnergy(CONFIG.balance.energyPerReaction);
                    return true;
                }
                return false;
            }

            if (!curElem) {
                monster.element = newElem;
                return false;
            }

            let reacted = false;
            let reactionName = '';
            let extraDmg = 0;
            let multiply = 1;
            const reactConfig = CONFIG.reactions;

            if ((curElem === 'fire' && newElem === 'water') || (curElem === 'water' && newElem === 'fire')) {
                reactionName = '💧 蒸发';
                multiply = (reactConfig.vaporize.base + reactConfig.vaporize.perLevel * game.elementMasteryLevel) * mastery;
                reacted = true;
            } else if ((curElem === 'fire' && newElem === 'ice') || (curElem === 'ice' && newElem === 'fire')) {
                reactionName = '❄️ 融化';
                multiply = (reactConfig.melt.base + reactConfig.melt.perLevel * game.elementMasteryLevel) * mastery;
                reacted = true;
            } else if ((curElem === 'thunder' && newElem === 'fire') || (curElem === 'fire' && newElem === 'thunder')) {
                reactionName = '💥 超载';
                extraDmg = bullet.damage * (reactConfig.overload.base + reactConfig.overload.perLevel * game
                .elementMasteryLevel) * mastery;
                for (const other of monsters) {
                    if (other === monster || other.isDead) continue;
                    if (dist(monster, other) < 140) {
                        other.hp -= extraDmg * 0.6;
                        other.hitFlash = 8;
                        spawnParticles(other.x, other.y, '#f1c40f', 8);
                        spawnFloatingText(other.x, other.y - 20, `-${Math.floor(extraDmg*0.6)}`, '#f1c40f', 14);
                        if (other.hp <= 0) killMonster(other, monsters.indexOf(other));
                    }
                }
                spawnParticles(monster.x, monster.y, '#f1c40f', 25, [2, 6], [20, 40]);
                const pushForce = 50 + 0.25 * extraDmg;
                for (const other of monsters) {
                    if (other === monster || other.isDead) continue;
                    if (dist(monster, other) < 140) {
                        const angle = angleTo(monster, other);
                        other.x += Math.cos(angle) * pushForce * 0.3;
                        other.y += Math.sin(angle) * pushForce * 0.3;
                        other.x = clamp(other.x, other.radius, W - other.radius);
                        other.y = clamp(other.y, other.radius, H - other.radius);
                    }
                }
                const angleMain = angleTo({ x: game.towerX, y: game.towerY }, monster);
                monster.x += Math.cos(angleMain) * pushForce * 0.2;
                monster.y += Math.sin(angleMain) * pushForce * 0.2;
                monster.x = clamp(monster.x, monster.radius, W - monster.radius);
                monster.y = clamp(monster.y, monster.radius, H - monster.radius);
                reacted = true;
            } else if ((curElem === 'thunder' && newElem === 'water') || (curElem === 'water' && newElem === 'thunder')) {
                reactionName = '⚡ 感电';
                const chainCount = 2 + Math.floor(game.elementMasteryLevel / 2);
                const chainDmg = bullet.damage * (reactConfig.electroCharged.base + reactConfig.electroCharged.perLevel *
                    game.elementMasteryLevel) * mastery;
                let targets = [monster];
                let visited = new Set();
                visited.add(monster);
                let currentTarget = monster;
                for (let c = 0; c < chainCount; c++) {
                    let nearest = null;
                    let minDist = 250;
                    for (const other of monsters) {
                        if (other.isDead || visited.has(other)) continue;
                        const d = dist(currentTarget, other);
                        if (d < minDist) {
                            minDist = d;
                            nearest = other;
                        }
                    }
                    if (!nearest) break;
                    visited.add(nearest);
                    const dmgFactor = Math.pow(0.75, c + 1);
                    const dmg = chainDmg * dmgFactor;
                    nearest.hp -= dmg;
                    nearest.hitFlash = 8;
                    spawnParticles(nearest.x, nearest.y, '#f1c40f', 8);
                    spawnFloatingText(nearest.x, nearest.y - 20, `-${Math.floor(dmg)}`, '#f1c40f', 14);
                    if (nearest.hp <= 0) killMonster(nearest, monsters.indexOf(nearest));
                    currentTarget = nearest;
                }
                spawnParticles(monster.x, monster.y, '#f1c40f', 15);
                reacted = true;
            } else if ((curElem === 'ice' && newElem === 'water') || (curElem === 'water' && newElem === 'ice')) {
                reactionName = '❄️ 冻结';
                const duration = Math.floor((reactConfig.freeze.base + reactConfig.freeze.perLevel * game.elementMasteryLevel) *
                    60);
                monster.frozen = duration;
                monster.element = 'ice';
                spawnParticles(monster.x, monster.y, '#74b9ff', 15);
                reacted = true;
            } else if ((curElem === 'ice' && newElem === 'thunder') || (curElem === 'thunder' && newElem === 'ice')) {
                reactionName = '⚡ 超导';
                extraDmg = bullet.damage * (reactConfig.superconduct.base + reactConfig.superconduct.perLevel * game
                    .elementMasteryLevel) * mastery;
                for (const other of monsters) {
                    if (other === monster || other.isDead) continue;
                    if (dist(monster, other) < 150) {
                        other.hp -= extraDmg * 0.6;
                        other.hitFlash = 8;
                        spawnParticles(other.x, other.y, '#c39bd3', 8);
                        spawnFloatingText(other.x, other.y - 20, `-${Math.floor(extraDmg*0.6)}`, '#c39bd3', 14);
                        if (other.hp <= 0) killMonster(other, monsters.indexOf(other));
                    }
                }
                spawnParticles(monster.x, monster.y, '#c39bd3', 25, [2, 6], [20, 40]);
                reacted = true;
            }

            if (reacted) {
                spawnFloatingText(monster.x, monster.y - 60, reactionName, '#ffffff', 28);
                addEnergy(CONFIG.balance.energyPerReaction);
                if (multiply > 1) {
                    const addDmg = bullet.damage * (multiply - 1);
                    monster.hp -= addDmg;
                    monster.hitFlash = 8;
                    spawnFloatingText(monster.x, monster.y - 30, `+${Math.floor(addDmg)}`, '#ffd93d', 18);
                }
                if (!(reactionName.includes('蒸发') || reactionName.includes('融化'))) {
                    if (reactionName !== '❄️ 冻结') {
                        monster.element = null;
                    }
                } else {
                    if (newElem === 'fire' || newElem === 'water') {
                        monster.element = newElem;
                    } else {
                        monster.element = null;
                    }
                }
                return true;
            }

            if (newElem !== 'wind') {
                monster.element = newElem;
            }
            return false;
        }

        // ---------- 子弹更新 ----------
        function updateBullets() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                if (b.isDead) { bullets.splice(i, 1); continue; }
                let speedMul = 1;
                const aura = getErodingAuraEffect(b.x, b.y);
                if (aura.inAura) {
                    speedMul = aura.bulletSpeedReduce;
                }
                b.x += b.vx * speedMul;
                b.y += b.vy * speedMul;
                if (b.x - b.radius < 0 || b.x + b.radius > W || b.y - b.radius < 0 || b.y + b.radius > H) {
                    if (b.canBounce && b.bounceCount < b.maxBounce) {
                        if (b.x - b.radius < 0) { b.x = b.radius;
                            b.vx = -b.vx; }
                        if (b.x + b.radius > W) { b.x = W - b.radius;
                            b.vx = -b.vx; }
                        if (b.y - b.radius < 0) { b.y = b.radius;
                            b.vy = -b.vy; }
                        if (b.y + b.radius > H) { b.y = H - b.radius;
                            b.vy = -b.vy; }
                        b.bounceCount++;
                        spawnParticles(b.x, b.y, '#74b9ff', 3);
                    } else {
                        b.isDead = true;
                        spawnParticles(b.x, b.y, '#74b9ff', 5);
                        continue;
                    }
                }
                for (let j = monsters.length - 1; j >= 0; j--) {
                    const m = monsters[j];
                    if (m.isDead) continue;
                    if (dist(b, m) < b.radius + m.radius) {
                        if (b.hitMonsters.has(j)) continue;
                        let finalDmg = b.damage;
                        let dmgColor = '#ff6b6b';
                        if (!b.isPhysical) {
                            const reacted = triggerReaction(b, m);
                            if (reacted) {
                                dmgColor = '#ffd700';
                            } else {
                                const elemColors = {
                                    fire: '#e67e22',
                                    ice: '#3498db',
                                    thunder: '#f1c40f',
                                    water: '#1abc9c',
                                    wind: '#9b59b6',
                                };
                                dmgColor = elemColors[b.type] || '#74b9ff';
                            }
                        } else {
                            dmgColor = '#ffffff';
                        }
                        if (m.isBoss && m._vulnerable) finalDmg = Math.floor(b.damage * 1.5);
                        m.hp -= finalDmg;
                        m.hitFlash = 8;
                        b.hitMonsters.add(j);
                        spawnParticles(m.x, m.y, '#ff6b6b', 6);
                        spawnFloatingText(m.x, m.y - 20, `-${finalDmg}`, dmgColor, 16);
                        if (b.isEmpowered) {
                            createEye(b.x, b.y);
                        }
                        if (m.hp <= 0) {
                            killMonster(m, j);
                        }
                        b.isDead = true;
                        spawnParticles(b.x, b.y, '#74b9ff', 5);
                        break;
                    }
                }
            }

            for (let i = enemyBullets.length - 1; i >= 0; i--) {
